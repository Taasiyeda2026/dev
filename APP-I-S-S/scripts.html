<script>
  const DEFAULT_MONTHS = [3, 4, 5, 6, 7, 8];
  const MONTH_LABELS = {
    1: 'ינואר',
    2: 'פברואר',
    3: 'מרץ',
    4: 'אפריל',
    5: 'מאי',
    6: 'יוני',
    7: 'יולי',
    8: 'אוגוסט',
    9: 'ספטמבר',
    10: 'אוקטובר',
    11: 'נובמבר',
    12: 'דצמבר'
  };

  const state = {
    activeView: 'all',
    selectedMonth: null,
    payload: null,
    expenseSearch: '',
    incomeSearch: '',
    expenseFilter: 'all',
    incomeFilter: 'all',
    expenseMonths: [],
    incomeMonths: [],
    statusMode: 'income',
    showMonthPicker: false,
    openWeekKey: null,
    openFlowRowKey: null
  };

  const yearTabsEl = document.getElementById('year-tabs');
  const monthTabsEl = document.getElementById('month-tabs');
  const managementTabsEl = document.getElementById('management-tabs');
  const monitoringTabsEl = document.getElementById('monitoring-tabs');

  const summaryPanel = document.getElementById('summary-panel');
  const expensesPanel = document.getElementById('expenses-panel');
  const incomesPanel = document.getElementById('incomes-panel');
  const flowPanel = document.getElementById('flow-panel');
  const statusPanel = document.getElementById('status-panel');

  const kpiGrid = document.getElementById('kpi-grid');

  function monthLabel(month) {
    return MONTH_LABELS[month] || String(month);
  }

  function formatCurrency(value) {
    const num = Number(value);
    if (!Number.isFinite(num)) return '';
    return new Intl.NumberFormat('he-IL', {
      style: 'currency',
      currency: 'ILS',
      maximumFractionDigits: 0
    }).format(num);
  }

  function formatNumber(value) {
    const num = Number(value);
    if (!Number.isFinite(num)) return '';
    return new Intl.NumberFormat('he-IL', { maximumFractionDigits: 0 }).format(num);
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function escapeAttr(value) {
    return escapeHtml(value);
  }

  function buildMonthRange(startMonth, endMonth) {
    const start = Number(startMonth || 3);
    const end = Number(endMonth || 8);

    if (!Number.isFinite(start) || !Number.isFinite(end) || start > end) {
      return [...DEFAULT_MONTHS];
    }

    const months = [];
    for (let month = start; month <= end; month++) {
      months.push(month);
    }
    return months.length ? months : [...DEFAULT_MONTHS];
  }

  function normalizeDashboardData(raw) {
    const startMonth = Number(raw?.startMonth || 3);
    const endMonth = Number(raw?.endMonth || 8);

    return {
      organizationName: raw?.organizationName || '',
      workYear: Number(raw?.workYear || new Date().getFullYear()),
      openingBalance: Number(raw?.openingBalance || 0),
      startMonth,
      endMonth,
      months: Array.isArray(raw?.months) && raw.months.length
        ? raw.months.map(Number)
        : buildMonthRange(startMonth, endMonth),
      balance: raw?.balance,
      monthlySummary: Array.isArray(raw?.monthlySummary) ? raw.monthlySummary : [],
      weekly: Array.isArray(raw?.weekly) ? raw.weekly : [],
      expenseGroups: Array.isArray(raw?.expenseGroups) ? raw.expenseGroups : [],
      incomeGroups: Array.isArray(raw?.incomeGroups) ? raw.incomeGroups : [],
      cashflowDays: Array.isArray(raw?.cashflowDays) ? raw.cashflowDays : [],
      expensesSheetRows: Array.isArray(raw?.expensesSheetRows) ? raw.expensesSheetRows : [],
      incomesSheetRows: Array.isArray(raw?.incomesSheetRows) ? raw.incomesSheetRows : [],
      totalIncome: raw?.totalIncome,
      totalExpense: raw?.totalExpense,
      closingBalance: raw?.closingBalance,
      rawData: raw || {}
    };
  }

  function firstDefined(...values) {
    for (const value of values) {
      if (value !== undefined && value !== null && value !== '') return value;
    }
    return null;
  }

  function readServerNumber(...values) {
    const picked = firstDefined(...values);
    if (picked === null) return null;

    const num = Number(picked);
    return Number.isFinite(num) ? num : null;
  }

  function formatServerCurrency(value) {
    return value === null || value === undefined || value === '' ? '' : formatCurrency(value);
  }

  function getAvailableMonths() {
    return Array.isArray(state.payload?.months) && state.payload.months.length
      ? state.payload.months
      : buildMonthRange(state.payload?.startMonth, state.payload?.endMonth);
  }

  function getSelectedMonth() {
    return Number.isFinite(Number(state.selectedMonth)) ? Number(state.selectedMonth) : null;
  }

  function getMonthlyRowByMonth(month) {
    return (state.payload?.monthlySummary || []).find(
      row => Number(row.month) === Number(month)
    ) || null;
  }

  function getFilteredMonthlyRows() {
    const month = getSelectedMonth();
    const rows = state.payload?.monthlySummary || [];
    return month ? rows.filter(row => Number(row.month) === month) : rows;
  }

  function getSummaryTotalsForView() {
    const month = getSelectedMonth();
    const monthRow = month ? getMonthlyRowByMonth(month) : null;
    const rows = state.payload?.monthlySummary || [];

    if (monthRow) {
      const monthIncome = readServerNumber(monthRow.income);
      const monthExpense = readServerNumber(monthRow.expense);

      return {
        totalIncome: monthIncome,
        totalExpense: monthExpense,
        net: monthIncome !== null && monthExpense !== null ? monthIncome - monthExpense : null,
        closing: readServerNumber(monthRow.closing, monthRow.balance)
      };
    }

    const directIncome = readServerNumber(state.payload?.totalIncome);
    const directExpense = readServerNumber(state.payload?.totalExpense);
    const directClosing = readServerNumber(state.payload?.closingBalance, state.payload?.balance);

    const fallbackIncome = rows.length
      ? rows.reduce((sum, row) => sum + Number(row.income || 0), 0)
      : null;

    const fallbackExpense = rows.length
      ? rows.reduce((sum, row) => sum + Number(row.expense || 0), 0)
      : null;

    const fallbackClosing = rows.length
      ? readServerNumber(
          rows[rows.length - 1]?.closing,
          rows[rows.length - 1]?.balance,
          state.payload?.balance
        )
      : readServerNumber(state.payload?.balance);

    const totalIncome = directIncome !== null ? directIncome : fallbackIncome;
    const totalExpense = directExpense !== null ? directExpense : fallbackExpense;
    const closing = directClosing !== null ? directClosing : fallbackClosing;

    return {
      totalIncome,
      totalExpense,
      net: totalIncome !== null && totalExpense !== null ? totalIncome - totalExpense : null,
      closing
    };
  }

  function getTotals() {
    return getSummaryTotalsForView();
  }

  function normalizeInlineText(value) {
    return String(value ?? '')
      .replace(/[\r\n]+/g, ', ')
      .replace(/[•·]+/g, ', ')
      .replace(/\s*\|\s*/g, ', ')
      .replace(/\s{2,}/g, ' ')
      .replace(/,\s*,+/g, ', ')
      .replace(/^,\s*|\s*,$/g, '')
      .trim();
  }

  function buildCombinedDetail(incomeText, expenseText) {
    const parts = [];
    if (incomeText) parts.push(incomeText);
    if (expenseText) parts.push(expenseText);
    return parts.join(' | ');
  }

  function groupBy(array, keyGetter) {
    const map = new Map();

    array.forEach(item => {
      const key = keyGetter(item);
      if (!map.has(key)) {
        map.set(key, []);
      }
      map.get(key).push(item);
    });

    return [...map.entries()].map(([key, items]) => ({ key, items }));
  }

  function getIncomeMonthNumber(row) {
    if (Number(row?.month)) return Number(row.month);

    if (row?.dueDateISO) {
      const match = String(row.dueDateISO).match(/^\d{4}-(\d{2})-/);
      if (match) return Number(match[1]);
    }

    if (row?.dueDateLabel) {
      const match = String(row.dueDateLabel).match(/^\d{1,2}\/\d{1,2}\/\d{4}$/);
      if (match) return Number(String(row.dueDateLabel).split('/')[1]);
    }

    return null;
  }

  function getFilteredExpenseRows() {
    const rows = state.payload?.expensesSheetRows || [];
    const search = state.expenseSearch.trim().toLowerCase();
    const selectedMonths = state.expenseMonths.length
      ? state.expenseMonths.map(Number)
      : (getSelectedMonth() ? [getSelectedMonth()] : []);

    return rows.filter(row => {
      const matchMonth = !selectedMonths.length || selectedMonths.includes(Number(row.month));
      const matchFilter =
        state.expenseFilter === 'all' || String(row.category || '') === state.expenseFilter;
      const haystack = `${row.group || ''} ${row.category || ''} ${row.detail || ''} ${row.day || ''} ${row.month || ''}`.toLowerCase();
      const matchSearch = !search || haystack.includes(search);

      return matchMonth && matchFilter && matchSearch;
    });
  }

  function getFilteredIncomeRows() {
    const rows = state.payload?.incomesSheetRows || [];
    const search = state.incomeSearch.trim().toLowerCase();
    const selectedMonths = state.incomeMonths.length
      ? state.incomeMonths.map(Number)
      : (getSelectedMonth() ? [getSelectedMonth()] : []);

    return rows.filter(row => {
      const dueMonth = getIncomeMonthNumber(row);
      const matchMonth = !selectedMonths.length || selectedMonths.includes(dueMonth) || selectedMonths.includes(Number(row.month));
      const matchFilter =
        state.incomeFilter === 'all' || String(row.fund || '') === state.incomeFilter;
      const haystack = `${row.account || ''} ${row.fund || ''} ${row.detail || ''} ${row.notes || ''} ${row.dueDateLabel || ''}`.toLowerCase();
      const matchSearch = !search || haystack.includes(search);

      return matchMonth && matchFilter && matchSearch;
    });
  }

  function shouldShowPlainTotals(type) {
    if (type === 'expense') {
      return !state.expenseSearch.trim() && state.expenseFilter === 'all';
    }
    if (type === 'income') {
      return !state.incomeSearch.trim() && state.incomeFilter === 'all';
    }
    return true;
  }

  function getExpenseHierarchy(rows) {
    const selectedMonth = getSelectedMonth();
    const useServerGroups =
      !selectedMonth &&
      !state.expenseSearch.trim() &&
      state.expenseFilter === 'all' &&
      Array.isArray(state.payload?.expenseGroups);

    if (useServerGroups) {
      return state.payload.expenseGroups.map(group => ({
        key: String(group.name || 'ללא קבוצה'),
        total: null,
        count: Array.isArray(group.items) ? group.items.length : 0,
        subgroups: [
          {
            key: 'פירוט',
            total: null,
            rows: Array.isArray(group.items) ? group.items : []
          }
        ]
      }));
    }

    const grouped = groupBy(
      rows,
      row => String(row.group || row.category || 'ללא קבוצה').trim() || 'ללא קבוצה'
    );

    return grouped.map(group => ({
      key: group.key,
      total: null,
      count: group.items.length,
      subgroups: groupBy(group.items, row => {
        if (!selectedMonth) return monthLabel(Number(row.month) || 0) || 'ללא חודש';
        return String(row.category || 'ללא קטגוריה').trim() || 'ללא קטגוריה';
      }).map(subgroup => ({
        key: subgroup.key,
        total: null,
        rows: subgroup.items
      }))
    }));
  }

  function getIncomeHierarchy(rows) {
    const selectedMonth = getSelectedMonth();
    const useServerGroups =
      !selectedMonth &&
      !state.incomeSearch.trim() &&
      state.incomeFilter === 'all' &&
      Array.isArray(state.payload?.incomeGroups);

    if (useServerGroups) {
      return state.payload.incomeGroups.map(group => ({
        key: String(group.name || 'ללא מקור הכנסה'),
        total: null,
        count: Array.isArray(group.items) ? group.items.length : 0,
        subgroups: [
          {
            key: 'פירוט',
            total: null,
            rows: Array.isArray(group.items) ? group.items : []
          }
        ]
      }));
    }

    const grouped = groupBy(
      rows,
      row => String(row.fund || 'ללא מקור הכנסה').trim() || 'ללא מקור הכנסה'
    );

    return grouped.map(group => ({
      key: group.key,
      total: null,
      count: group.items.length,
      subgroups: groupBy(group.items, row => {
        if (!selectedMonth) return monthLabel(getIncomeMonthNumber(row) || 0) || 'ללא חודש';
        return String(row.account || row.detail || 'רשומות').trim() || 'רשומות';
      }).map(subgroup => ({
        key: subgroup.key,
        total: null,
        rows: subgroup.items
      }))
    }));
  }

  function formatExpenseRowTitle(row) {
    if (row.detail) return row.detail;
    if (row.category) return row.category;
    return 'רשומת הוצאה';
  }

  function formatExpenseRowMeta(row) {
    const parts = [];
    if (row.month && !getSelectedMonth()) parts.push(monthLabel(row.month));
    if (row.day) parts.push(`יום ${row.day}`);
    if (row.category) parts.push(row.category);
    if (row.group) parts.push(row.group);
    return parts.join(' · ');
  }

  function formatIncomeRowTitle(row) {
    if (row.fund) return row.fund;
    if (row.detail) return row.detail;
    if (row.account) return `חשבון ${row.account}`;
    return 'רשומת הכנסה';
  }

  function formatIncomeRowMeta(row) {
    const parts = [];
    if (row.account && row.detail) parts.push(`חשבון ${row.account}`);
    if (row.dueDateLabel) parts.push(row.dueDateLabel);
    if (row.notes) parts.push(normalizeInlineText(row.notes));
    return parts.join(' · ');
  }

  function renderExpenseAccordion(rows, emptyText) {
    const hierarchy = getExpenseHierarchy(rows);

    if (!hierarchy.length) {
      return `<div class="empty-state">${escapeHtml(emptyText)}</div>`;
    }

    return `
      <div class="accordion-list">
        ${hierarchy.map((group, index) => `
          <details class="group-card" ${index === 0 ? 'open' : ''}>
            <summary class="group-summary">
              <span class="group-summary-title">
                <span class="summary-badge">${group.count}</span>
                <span>${escapeHtml(group.key)}</span>
              </span>
              <span class="plain-total expense">${formatServerCurrency(group.total)}</span>
            </summary>
            <div class="group-body">
              <div class="nested-list">
                ${group.subgroups.map((subgroup, subIndex) => `
                  <details class="subgroup-card" ${group.subgroups.length === 1 || subIndex === 0 ? 'open' : ''}>
                    <summary class="subgroup-summary">
                      <span class="subgroup-summary-title">
                        <span class="summary-badge">${subgroup.rows.length}</span>
                        <span>${escapeHtml(subgroup.key)}</span>
                      </span>
                      <span class="plain-total expense">${formatServerCurrency(subgroup.total)}</span>
                    </summary>
                    <div class="group-body">
                      <div class="rows-list">
                        ${subgroup.rows.map(row => `
                          <div class="group-row">
                            <div class="group-row-main">
                              <div class="group-row-title">${escapeHtml(formatExpenseRowTitle(row))}</div>
                              <div class="group-row-meta">${escapeHtml(formatExpenseRowMeta(row))}</div>
                            </div>
                            <div class="group-row-amount expense">${formatCurrency(row.amount)}</div>
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  </details>
                `).join('')}
              </div>
            </div>
          </details>
        `).join('')}
      </div>
    `;
  }

  function renderIncomeAccordion(rows, emptyText) {
    const hierarchy = getIncomeHierarchy(rows);

    if (!hierarchy.length) {
      return `<div class="empty-state">${escapeHtml(emptyText)}</div>`;
    }

    return `
      <div class="accordion-list">
        ${hierarchy.map((group, index) => `
          <details class="group-card" ${index === 0 ? 'open' : ''}>
            <summary class="group-summary">
              <span class="group-summary-title">
                <span class="summary-badge">${group.count}</span>
                <span>${escapeHtml(group.key)}</span>
              </span>
              <span class="plain-total income">${formatServerCurrency(group.total)}</span>
            </summary>
            <div class="group-body">
              <div class="nested-list">
                ${group.subgroups.map((subgroup, subIndex) => `
                  <details class="subgroup-card" ${group.subgroups.length === 1 || subIndex === 0 ? 'open' : ''}>
                    <summary class="subgroup-summary">
                      <span class="subgroup-summary-title">
                        <span class="summary-badge">${subgroup.rows.length}</span>
                        <span>${escapeHtml(subgroup.key)}</span>
                      </span>
                      <span class="plain-total income">${formatServerCurrency(subgroup.total)}</span>
                    </summary>
                    <div class="group-body">
                      <div class="rows-list">
                        ${subgroup.rows.map(row => `
                          <div class="group-row">
                            <div class="group-row-main">
                              <div class="group-row-title">${escapeHtml(formatIncomeRowTitle(row))}</div>
                              <div class="group-row-meta">${escapeHtml(formatIncomeRowMeta(row))}</div>
                            </div>
                            <div class="group-row-amount income">${formatCurrency(row.amount)}</div>
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  </details>
                `).join('')}
              </div>
            </div>
          </details>
        `).join('')}
      </div>
    `;
  }

  function buildExpenseCategoryOptions(rows) {
    const categories = [
      ...new Set(rows.map(row => String(row.category || '').trim()).filter(Boolean))
    ].sort();

    return [
      '<option value="all">כל הקטגוריות</option>',
      ...categories.map(category => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`)
    ].join('');
  }

  function buildIncomeFundOptions(rows) {
    const funds = [
      ...new Set(rows.map(row => String(row.fund || '').trim()).filter(Boolean))
    ].sort();

    return [
      '<option value="all">כל מקורות המימון</option>',
      ...funds.map(fund => `<option value="${escapeHtml(fund)}">${escapeHtml(fund)}</option>`)
    ].join('');
  }

  function getReferenceLists() {
    const raw = state.payload?.rawData || {};
    const source = raw.lists || raw.listSheet || raw.referenceLists || {};
    const categoryPairs = Array.isArray(source.categoryDetailPairs) ? source.categoryDetailPairs : [];
    const incomeFunds = Array.isArray(source.incomeFunds) ? source.incomeFunds : [];

    const fallbackCategories = [...new Set((state.payload?.expensesSheetRows || [])
      .map(row => String(row.category || '').trim())
      .filter(Boolean))];
    const fallbackDetails = [...new Set((state.payload?.expensesSheetRows || [])
      .map(row => String(row.detail || '').trim())
      .filter(Boolean))];
    const fallbackFunds = [...new Set((state.payload?.incomesSheetRows || [])
      .map(row => String(row.fund || '').trim())
      .filter(Boolean))];

    return {
      categoryPairs: categoryPairs.length ? categoryPairs : fallbackCategories.map(category => ({ category, detail: '' })),
      details: categoryPairs.length ? [...new Set(categoryPairs.map(p => String(p.detail || '').trim()).filter(Boolean))] : fallbackDetails,
      funds: incomeFunds.length ? incomeFunds : fallbackFunds
    };
  }

  function buildMonthMultiSelectHtml(type) {
    const options = getAvailableMonths();
    const selected = type === 'expense' ? state.expenseMonths : state.incomeMonths;
    const id = type === 'expense' ? 'expense-month-filter' : 'income-month-filter';
    return `
      <label class="tiny-filter-label" for="${id}">חודשים</label>
      <select id="${id}" class="tiny-month-filter" multiple size="2">
        ${options.map(month => `
          <option value="${month}" ${selected.includes(Number(month)) ? 'selected' : ''}>
            ${monthLabel(month)}
          </option>
        `).join('')}
      </select>
    `;
  }

  function buildTabs() {
    const availableMonths = getAvailableMonths();
    const isAllMonths = state.activeView === 'all' && state.selectedMonth == null;

    const selectedMonthLabel = state.selectedMonth ? monthLabel(state.selectedMonth) : 'שנת 2026';
    yearTabsEl.innerHTML = `
      <button class="tab-btn tab-btn--year ${state.showMonthPicker ? 'active' : ''}" data-view="all" data-role="year-toggle">
        2026 · ${selectedMonthLabel}
      </button>
    `;

    monthTabsEl.innerHTML = `
      <div class="month-picker-shell">
        ${state.showMonthPicker ? `
          <div class="month-picker-list">
            <button class="tab-btn tab-btn--month ${isAllMonths ? 'active' : ''}" data-month="all">שנת 2026</button>
            ${availableMonths.map(month => `
              <button class="tab-btn tab-btn--month ${Number(state.selectedMonth) === Number(month) ? 'active' : ''}" data-month="${month}">
                ${monthLabel(month)}
              </button>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;

    managementTabsEl.innerHTML = `
      <button class="tab-btn tab-btn--management ${state.activeView === 'incomes-sheet' ? 'active' : ''}" data-view="incomes-sheet">
        הכנסות
      </button>
      <button class="tab-btn tab-btn--management ${state.activeView === 'expenses-sheet' ? 'active' : ''}" data-view="expenses-sheet">
        הוצאות
      </button>
    `;

    monitoringTabsEl.innerHTML = `
      <button class="tab-btn tab-btn--monitoring ${state.activeView === 'status' ? 'active' : ''}" data-view="status">
        סטטוס
      </button>
      <button class="tab-btn tab-btn--monitoring ${state.activeView === 'flow' ? 'active' : ''}" data-view="flow">
        תזרים
      </button>
    `;
  }

  function renderHero() {
    const { totalIncome, totalExpense } = getTotals();
    const showMonthKpis = state.activeView === 'all' && getSelectedMonth() !== null;

    const kpis = showMonthKpis
      ? [
          {
            label: 'סה״כ הכנסות',
            value: totalIncome,
            className: totalIncome === null ? '' : 'income'
          },
          {
            label: 'סה״כ הוצאות',
            value: totalExpense,
            className: totalExpense === null ? '' : 'expense'
          }
        ]
      : [];

    kpiGrid.innerHTML = kpis.map(item => `
      <article class="kpi-card">
        <div class="kpi-label">${item.label}</div>
        <div class="kpi-value ${item.className}">${item.value === null ? '—' : formatCurrency(item.value)}</div>
      </article>
    `).join('');
  }


  function renderWeekDetails(item) {
    const detailRows = Array.isArray(item?.details)
      ? item.details
      : (Array.isArray(item?.rows) ? item.rows : []);

    if (!detailRows.length) {
      return '<div class="week-detail-row">אין פירוט נוסף לשבוע זה.</div>';
    }

    return detailRows.slice(0, 16).map(row => {
      const title = escapeHtml(row?.detail || row?.name || row?.label || row?.description || 'רשומה');
      const amount = readServerNumber(row?.amount, row?.incomeAmount, row?.expenseAmount);
      const date = escapeHtml(row?.date || row?.dayLabel || row?.range || '');
      const amountText = amount === null ? '' : formatCurrency(amount);
      return `<div class="week-detail-row">${date ? `${date} · ` : ''}${title}${amountText ? ` · ${amountText}` : ''}</div>`;
    }).join('');
  }

  function renderSummary() {
    const rows = getFilteredMonthlyRows();
    const selectedMonth = getSelectedMonth();
    const allWeekly = Array.isArray(state.payload?.weekly) ? state.payload.weekly : [];
    const weekly = selectedMonth
      ? allWeekly.filter(item => Number(item.month) === selectedMonth)
      : allWeekly;
    const totals = getSummaryTotalsForView();
    const weeklyTitle = selectedMonth
      ? `סיכום שבועי · ${monthLabel(selectedMonth)}`
      : 'סיכום שבועי שנתי';

    const weeklySection = weekly.length ? `
      <div style="display:flex; justify-content:center; margin: 6px 0 18px; width:100%;">

  function renderAll() {
    buildTabs();

    [summaryPanel, expensesPanel, incomesPanel, flowPanel, statusPanel].forEach(panel => {
      panel.hidden = true;
    });

    if (state.activeView === 'status') {
      renderStatus();
      statusPanel.hidden = false;
      return;
    }

    if (state.activeView === 'expenses-sheet') {
      renderExpensesSheet();
      expensesPanel.hidden = false;
      return;
    }

    if (state.activeView === 'incomes-sheet') {
      renderIncomesSheet();
      incomesPanel.hidden = false;
      return;
    }

    if (state.activeView === 'flow') {
      renderFlow();
      flowPanel.hidden = false;
      return;
    }

    renderSummary();
    summaryPanel.hidden = false;
  }

  function showLoadError(err) {
    [summaryPanel, expensesPanel, incomesPanel, flowPanel, statusPanel].forEach(panel => {
      panel.hidden = true;

    summaryPanel.hidden = false;
    summaryPanel.innerHTML = `
      <div class="error-box">

        <div style="margin-top:8px; direction:ltr; unicode-bidi:isolate;">${err && err.message ? err.message : err}</div>
      </div>
    `;
  }

  function loadDashboard() {
    summaryPanel.hidden = false;
    summaryPanel.innerHTML = '<div class="empty-state">טוען נתונים מהמערכת...</div>';

    google.script.run
      .withSuccessHandler(raw => {
        state.payload = normalizeDashboardData(raw);
        const available = getAvailableMonths();

        if (state.selectedMonth != null && !getAvailableMonths().includes(Number(state.selectedMonth))) {
          state.selectedMonth = null;
        }
        if (!state.expenseMonths.length) {
          state.expenseMonths = state.selectedMonth ? [Number(state.selectedMonth)] : (available[0] ? [Number(available[0])] : []);
        }
        if (!state.incomeMonths.length) {
          state.incomeMonths = state.selectedMonth ? [Number(state.selectedMonth)] : (available[0] ? [Number(available[0])] : []);
        }

        renderAll();
      })
      .withFailureHandler(err => {
        console.error('Dashboard load failed:', err);
        showLoadError(err);
      })
      .getDashboardData();
  }

  document.body.addEventListener('click', event => {
    if (state.showMonthPicker && !event.target.closest('#year-tabs') && !event.target.closest('#month-tabs')) {
      state.showMonthPicker = false;
      buildTabs();
    }

    const viewBtn = event.target.closest('[data-view]');
  if (viewBtn) {
    const view = viewBtn.dataset.view;
    const role = viewBtn.dataset.role;

    if (role === 'year-toggle') {
      state.activeView = 'all';
      state.showMonthPicker = !state.showMonthPicker;
      renderAll();
      return;
    }

    state.activeView = view;
    state.showMonthPicker = false;
    if (view !== 'all') state.openWeekKey = null;
    if (view !== 'flow') state.openFlowRowKey = null;

    if (view === 'all') {
      state.selectedMonth = null;
    }

    renderAll();
    return;
  }

  const monthBtn = event.target.closest('[data-month]');
    if (monthBtn) {
      const value = monthBtn.dataset.month;
      state.activeView = 'all';
      state.selectedMonth = value === 'all' ? null : (value ? Number(value) : null);
      if (state.selectedMonth) {
        state.expenseMonths = [state.selectedMonth];
        state.incomeMonths = [state.selectedMonth];
      }
      state.openWeekKey = null;
      state.openFlowRowKey = null;
      state.showMonthPicker = false;
      renderAll();
      return;
    }

    const weekBtn = event.target.closest('[data-week-key]');
    if (weekBtn) {
      const key = weekBtn.dataset.weekKey;
      state.openWeekKey = state.openWeekKey === key ? null : key;
      renderSummary();
      return;
    }

    const flowRow = event.target.closest('[data-flow-row]');
    if (flowRow) {
      const key = flowRow.dataset.flowRow;
      state.openFlowRowKey = state.openFlowRowKey === key ? null : key;
      renderFlow();
      return;
    }

    const statusModeBtn = event.target.closest('[data-status-mode]');
    if (statusModeBtn) {
      state.statusMode = statusModeBtn.dataset.statusMode === 'expense' ? 'expense' : 'income';
      renderStatus();
      return;
    }

    const actionBtn = event.target.closest('[data-action]');
    if (!actionBtn) return;

    const id = actionBtn.dataset.id;
    const action = actionBtn.dataset.action;

    if (action.startsWith('save-')) {
      const type = action.includes('expense') ? 'expense' : 'income';
      const data = { id };

      document.querySelectorAll(`[data-id="${id}"][data-field]`).forEach(input => {
        const field = input.dataset.field;
        const value = input.value;
        data[field] = field === 'amount' ? String(value).replace(/,/g, '') : value;
      });

      actionBtn.textContent = '⏳';

      google.script.run
        .withSuccessHandler(() => {
          actionBtn.textContent = '✅';
          setTimeout(loadDashboard, 350);
        })
        .withFailureHandler(err => {
          console.error(err);
          actionBtn.textContent = '⚠️';
        })
        .updateRowData(type, data);

      return;
    }

    if (action.startsWith('delete-')) {
      if (!confirm('למחוק שורה זו?')) return;

      const func = action.includes('expense') ? 'deleteExpenseRow' : 'deleteIncomeRow';

      google.script.run
        .withSuccessHandler(loadDashboard)
        .withFailureHandler(err => {
          console.error(err);
          alert('שגיאה במחיקה');
        })[func](id);
    }
  });

  document.body.addEventListener('input', event => {
    if (event.target.id === 'expense-search') {
      state.expenseSearch = event.target.value;
      renderExpensesSheet();
    }

    if (event.target.id === 'income-search') {
      state.incomeSearch = event.target.value;
      renderIncomesSheet();
    }

    if (event.target.classList.contains('amount-text')) {
      const raw = String(event.target.value).replace(/[^\d.-]/g, '');
      if (raw === '' || raw === '-' || raw === '.') return;
      const num = Number(raw);
      if (Number.isFinite(num)) {
        event.target.value = formatNumber(num);
      }
    }
  });

  document.body.addEventListener('change', event => {
    if (event.target.id === 'expense-filter') {
      state.expenseFilter = event.target.value;
      renderExpensesSheet();
    }

    if (event.target.id === 'income-filter') {
      state.incomeFilter = event.target.value;
      renderIncomesSheet();
    }

    if (event.target.id === 'expense-month-filter') {
      state.expenseMonths = [...event.target.selectedOptions].map(option => Number(option.value));
      renderExpensesSheet();
    }

    if (event.target.id === 'income-month-filter') {
      state.incomeMonths = [...event.target.selectedOptions].map(option => Number(option.value));
      renderIncomesSheet();
    }

    if (event.target.id === 'category-input') {
      const selected = event.target.value;
      const detailInput = document.getElementById('detail-input');
      const lists = getReferenceLists();
      const matched = lists.categoryPairs.find(pair => String(pair.category || '') === String(selected));
      if (detailInput && matched && matched.detail) {
        detailInput.value = matched.detail;
      }
    }

    if (event.target.classList.contains('expense-category-select')) {
      const rowId = event.target.dataset.id;
      const selected = event.target.value;
      const detailSelect = document.querySelector(`.expense-detail-select[data-id="${rowId}"]`);
      const lists = getReferenceLists();
      const matched = lists.categoryPairs.find(pair => String(pair.category || '') === String(selected));
      if (detailSelect && matched && matched.detail) {
        detailSelect.value = matched.detail;
      }
    }

    if (event.target.id === 'expense-date-input' || event.target.id === 'due-date-input') {
      event.target.blur();
    }
  });

  document.body.addEventListener('submit', event => {
    if (event.target.id === 'expense-form') {
      event.preventDefault();

      const msg = document.getElementById('form-msg');
      const selectedDate = event.target.querySelector('#expense-date-input').value;
      const dateObj = selectedDate ? new Date(selectedDate) : null;
      const fallbackMonth = getSelectedMonth() || getAvailableMonths()[0] || 3;
      const data = {
        month: dateObj ? (dateObj.getMonth() + 1) : fallbackMonth,
        day: dateObj ? dateObj.getDate() : '',
        category: event.target.querySelector('#category-input').value,
        detail: event.target.querySelector('#detail-input').value,
        amount: event.target.querySelector('#amount-input').value
      };

      msg.textContent = 'שומר...';

      google.script.run
        .withSuccessHandler(() => {
          event.target.reset();
          msg.textContent = 'נשמר בהצלחה';
          loadDashboard();
        })
        .withFailureHandler(err => {
          console.error(err);
          msg.textContent = 'שגיאה בשמירה';
        })
        .addExpenseFromDash(data);

      return;
    }

    if (event.target.id === 'income-form') {
      event.preventDefault();

      const msg = document.getElementById('income-form-msg');
      const data = {
        account: event.target.querySelector('#account-input').value,
        detail: event.target.querySelector('#income-detail-input').value,
        amount: event.target.querySelector('#income-amount-input').value,
        dueDate: event.target.querySelector('#due-date-input').value,
        notes: event.target.querySelector('#notes-input').value,
        fund: event.target.querySelector('#fund-input').value
      };

      msg.textContent = 'שומר...';

      google.script.run
        .withSuccessHandler(() => {
          event.target.reset();
          msg.textContent = 'נשמר בהצלחה';
          loadDashboard();
        })
        .withFailureHandler(err => {
          console.error(err);
          msg.textContent = 'שגיאה בשמירה';
        })
        .addIncomeFromDash(data);
    }
  });

  window.onload = loadDashboard;
</script>
