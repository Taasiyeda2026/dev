<head>

<title>דשבורד כספים - תעשיידע</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--bg:#f4f7fb;--panel:#fff;--line:#dde6f0;--soft:#f8fbff;--text:#152232;--muted:#6d7a8c;--green:#0f8b57;--red:#cf3f3f;--blue:#255f9a;--blue-soft:#eaf3ff;--shadow:0 10px 32px rgba(22,40,73,.08);--radius:22px}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Assistant",Arial,sans-serif;background:linear-gradient(180deg,#f7faff 0%,#f2f6fb 100%);color:var(--text)}
.page{max-width:1500px;margin:0 auto;padding:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-logo{width:28px;height:28px;flex:0 0 28px;border-radius:8px}.toolbar{display:flex;align-items:center;gap:10px}
.toolbar input,.toolbar select,.table input,.table select,.no-date-item input[type=date]{height:34px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:0 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.toolbar input{width:170px}.toolbar select{width:170px}.toolbar input:focus,.toolbar select:focus,.table input:focus,.table select:focus,.no-date-item input[type=date]:focus{border-color:#a3bad7;box-shadow:0 0 0 3px rgba(80,122,184,.12)}
h1{margin:0;font-size:30px;font-weight:800}h2{margin:0;font-size:24px;font-weight:800}h3{margin:0;font-size:17px;font-weight:800}.meta{color:var(--muted);font-size:14px;font-weight:700}
.section{padding:14px;margin-bottom:14px}.section-head,.subpanel-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.section-head{margin-bottom:12px}
.compact-shell{max-width:1080px;margin:0 auto}.compact-stack{display:grid;gap:12px}.week-grid,.weekly-detail-list{max-width:1080px;margin:0 auto}.week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.week-card,.kpi{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);padding:14px}.week-card{min-height:166px;display:flex;flex-direction:column;justify-content:space-between}.week-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.week-title{font-size:15px;font-weight:800}.week-range{font-size:12px;color:var(--muted);font-weight:700;text-align:left}.metric-label{color:var(--muted);font-size:12px;font-weight:700;margin-bottom:2px}.metric-value{font-size:27px;line-height:1;font-weight:800}.income{color:var(--green)}.expense{color:var(--red)}.plus{color:var(--green)}.minus{color:var(--red)}
.weekly-detail-list{display:grid;gap:10px}details.week-detail{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}details.week-detail[open]{box-shadow:0 10px 28px rgba(23,58,101,.08)}.week-summary{list-style:none;cursor:pointer;padding:12px 14px;display:grid;grid-template-columns:140px 1fr auto auto auto;gap:10px;align-items:center}.week-summary::-webkit-details-marker{display:none}.summary-title{font-size:15px;font-weight:800}.summary-range{color:var(--muted);font-size:13px;font-weight:700}.pill{min-width:110px;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800;text-align:center}.pill.income{background:rgba(15,139,87,.10)}.pill.expense{background:rgba(207,63,63,.10)}.pill.plus{background:rgba(15,139,87,.12)}.pill.minus{background:rgba(207,63,63,.12)}
.week-body{padding:0 14px 14px;display:grid;grid-template-columns:minmax(0,0.95fr) minmax(0,0.95fr);gap:10px;border-top:1px solid #eef3f8;background:#fcfdff}.subpanel,.chart-card,.event-card{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}.subpanel-head{padding:12px 14px;background:var(--soft);border-bottom:1px solid var(--line)}.table-shell{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:420px}.table th,.table td{padding:9px 10px;border-bottom:1px solid #edf2f7;text-align:right;vertical-align:middle;font-size:14px}.table th{background:#fbfdff;font-weight:800;white-space:nowrap}.table tr:last-child td,.event-row:last-child{border-bottom:none}.table input,.table select{width:100%}.amount{font-weight:800;white-space:nowrap}.muted{color:var(--muted)}.empty{padding:26px 14px;color:var(--muted);font-weight:700;text-align:center}
.no-date-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}.no-date-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.no-date-item .top{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}

</head>

<main class="page">
<section class="panel header">
<div class="brand">
<img class="brand-logo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%23255f9a'/><stop offset='100%' stop-color='%23173b67'/></linearGradient></defs><rect x='6' y='6' width='52' height='52' rx='16' fill='url(%23g)'/><circle cx='22' cy='22' r='6' fill='white' fill-opacity='0.95'/><circle cx='42' cy='22' r='6' fill='white' fill-opacity='0.85'/><circle cx='22' cy='42' r='6' fill='white' fill-opacity='0.85'/><path d='M32 30 L42 42 L22 42 Z' fill='white' fill-opacity='0.95'/></svg>" alt="לוגו תעשיידע" />
<h1>דשבורד כספים - תעשיידע</h1>
</div>
<div class="toolbar">
<input id="excel-file-input" type="file" accept=".xlsx,.xls,.csv" aria-label="טעינת קובץ אקסל" title="טעינת קובץ אקסל" />
<select id="month-filter" aria-label="סינון לפי חודש" title="סינון לפי חודש"></select>
</div>
</section>

<section class="panel section">
<div class="section-head"><h2>הוצאות צפויות</h2><div class="meta" id="expenses-meta"></div></div>
<div class="compact-shell compact-stack">
<div class="subpanel">
<div class="table-shell"><table class="table"><thead><tr><th>חודש</th><th>מועד</th><th>פירוט</th><th>סכום</th></tr></thead><tbody id="expenses-table-body"></tbody></table></div>
</div>
<div class="subpanel">
<div class="subpanel-head"><h3>הוצאות ללא מועד</h3><div class="meta" id="undated-meta"></div></div>
<div class="table-shell"><div class="no-date-list" id="undated-list"></div></div>
</div>
</div>
</section>

<section class="panel section">
<div class="section-head"><h2>הכנסות צפויות</h2><div class="meta" id="incomes-meta"></div></div>
<div class="compact-shell">
<div class="subpanel">
<div class="table-shell"><table class="table"><thead><tr><th>חודש</th><th>מועד</th><th>מימון</th><th>פירוט</th><th>סכום</th></tr></thead><tbody id="incomes-table-body"></tbody></table></div>
</div>
</div>
</section>

<section class="panel section" id="weekly-section" hidden>
<div class="section-head"><h2>תמונת מצב שבועית</h2><div class="meta" id="month-meta"></div></div>
<div class="week-grid" id="week-grid"></div>
<div class="section-head" style="margin-top:14px"><h2>פירוק שבועי להכנסות ולהוצאות</h2><div class="meta" id="detail-meta"></div></div>
<div class="weekly-detail-list" id="weekly-detail-list"></div>
</section>

<section class="panel section">
<div class="section-head"><h2>תזרים בנק</h2><div class="meta" id="bank-meta"></div></div>
<div class="bank-kpis" id="bank-kpis"></div>
<div class="bank-layout">
<div class="chart-card">
<div class="subpanel-head"><h3>עו״ש ותחזית</h3><div class="meta" id="chart-meta"></div></div>
<div class="chart-wrap">
<svg class="chart-svg" id="bank-chart" viewBox="0 0 900 280" preserveAspectRatio="none"></svg>
<div class="chart-note">הקו מציג את יתרת הבנק לפי הסינון הפעיל, עם זיהוי מיידי של ירידות וימים שליליים.</div>
</div>
</div>
<div class="event-card">
<div class="subpanel-head"><h3>תנועות והשפעה על הבנק</h3><div class="meta" id="events-meta"></div></div>
<div class="event-list" id="event-list"></div>
</div>
</div>
</section>
</main>
