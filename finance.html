<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>דשבורד כספים - תעשיידע</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      :root {
        --bg: #f4f7fa;
        --panel: #ffffff;
        --line: #d8e0ea;
        --text: #1b2a3a;
        --muted: #667789;
        --good: #147a43;
        --bad: #bf2f3b;
        --accent: #2e5f99;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Assistant", sans-serif;
      }
      .container { max-width: 1240px; margin: 0 auto; padding: 12px; display: grid; gap: 10px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
      .header-row { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
      .brand { display: flex; align-items: center; gap: 8px; }
      .logo { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, #2e5f99, #3aa67a); }
      h1, h2, h3 { margin: 0; }
      h1 { font-size: 24px; }
      h2 { font-size: 18px; }
      .tools { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .meta { color: var(--muted); font-size: 13px; }
      input, select {
        border: 1px solid var(--line); border-radius: 8px; height: 34px; padding: 0 10px; font: inherit; background: #fff;
      }
      .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
      .compact-table-wrap { overflow: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 580px; }
      th, td { border-bottom: 1px solid #edf1f5; padding: 6px 7px; text-align: right; font-size: 14px; white-space: nowrap; }
      th { background: #f7f9fc; font-weight: 700; }
      .amount-pos { color: var(--good); font-weight: 700; }
      .amount-neg { color: var(--bad); font-weight: 700; }
      .undated-list { display: grid; gap: 6px; }
      .undated-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; display: grid; grid-template-columns: 1fr 140px 150px; gap: 8px; align-items: center; }
      .weekly-cards { display: grid; grid-template-columns: repeat(5, minmax(160px, 1fr)); gap: 8px; }
      .week-card { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #fcfdff; }
      .week-range { color: var(--muted); font-size: 12px; }
      .weekly-list { display: grid; gap: 8px; margin-top: 8px; }
      details { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #fff; }
      summary { cursor: pointer; font-weight: 700; }
      .week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
      .bank-kpis { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 8px; margin-bottom: 8px; }
      .kpi { border: 1px solid var(--line); border-radius: 10px; padding: 8px; }
      .kpi-title { font-size: 12px; color: var(--muted); }
      .kpi-value { font-size: 23px; font-weight: 800; }
      .bank-grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 8px; }
      canvas { width: 100%; height: 280px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
      .movement-list { max-height: 280px; overflow: auto; border: 1px solid var(--line); border-radius: 10px; }
      .movement-item { display: grid; grid-template-columns: 90px 1fr 100px 130px; gap: 8px; border-bottom: 1px solid #edf1f5; padding: 7px; font-size: 13px; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
      @media (max-width: 960px) {
        .weekly-cards { grid-template-columns: 1fr 1fr; }
        .bank-kpis, .bank-grid, .week-grid, .undated-item { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <div class="header-row">
          <div class="brand">
            <div class="logo"></div>
            <h1>דשבורד כספים - תעשיידע</h1>
          </div>
          <div class="tools">
            <input id="fileInput" type="file" accept=".xlsx,.xls" />
            <select id="monthSelect"></select>
          </div>
        </div>
      </section>

      <section class="panel" id="expensesSection"></section>
      <section class="panel" id="incomesSection"></section>
      <section class="panel" id="weeklySection" hidden></section>
      <section class="panel" id="bankSection"></section>
    </main>

    <script>
      const MONTHS_HE = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];
      const monthKeyMap = MONTHS_HE.reduce((acc, m, idx) => ((acc[m] = idx + 1), acc), {});
      const formatMoney = (v) => `₪${Number(v || 0).toLocaleString("he-IL", { maximumFractionDigits: 0 })}`;
      const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString("he-IL") : "-";

      const seed = {
        incomes: [
          { id: "i1", year: 2026, month: 1, day: 10, date: "2026-01-10", fund: "משרד", detail: "מענק רבעוני", amount: 50000 },
          { id: "i2", year: 2026, month: 2, day: 18, date: "2026-02-18", fund: "לקוח", detail: "פרויקט ליבה", amount: 42000 },
          { id: "i3", year: 2026, month: 3, day: 8, date: "2026-03-08", fund: "שותף", detail: "החזר הוצאות", amount: 11000 }
        ],
        expenses: [
          { id: "e1", year: 2026, month: 1, day: 3, date: "2026-01-03", detail: "שכר", amount: 29000 },
          { id: "e2", year: 2026, month: 2, day: 12, date: "2026-02-12", detail: "שכירות", amount: 9000 },
          { id: "e3", year: 2026, month: 2, day: null, date: "", detail: "ספק שירות", amount: 4200 },
          { id: "e4", year: 2026, month: 3, day: 17, date: "2026-03-17", detail: "פרסום", amount: 7600 }
        ],
        bankDaily: [
          { date: "2026-01-01", year: 2026, month: 1, day: 1, incomeAmount: 0, expenseAmount: 0, bank: 120000, incomeDesc: "", expenseDesc: "" },
          { date: "2026-01-10", year: 2026, month: 1, day: 10, incomeAmount: 50000, expenseAmount: 0, bank: 170000, incomeDesc: "מענק", expenseDesc: "" },
          { date: "2026-02-12", year: 2026, month: 2, day: 12, incomeAmount: 0, expenseAmount: 9000, bank: 161000, incomeDesc: "", expenseDesc: "שכירות" },
          { date: "2026-03-17", year: 2026, month: 3, day: 17, incomeAmount: 0, expenseAmount: 7600, bank: 153400, incomeDesc: "", expenseDesc: "פרסום" }
        ]
      };

      const state = {
        incomes: structuredClone(seed.incomes),
        expenses: structuredClone(seed.expenses),
        bankDaily: structuredClone(seed.bankDaily),
        selectedMonth: "all",
        expenseBaseline: new Map()
      };

      state.expenses.forEach((e) => state.expenseBaseline.set(e.id, { amount: e.amount, date: e.date }));

      const byMonth = (arr) => state.selectedMonth === "all" ? arr : arr.filter((x) => x.month === Number(state.selectedMonth));
      const sum = (arr, key) => arr.reduce((a, b) => a + Number(b[key] || 0), 0);

      function excelDateToISO(value) {
        if (!value && value !== 0) return "";
        if (typeof value === "number") {
          const js = new Date(Math.round((value - 25569) * 86400 * 1000));
          return js.toISOString().slice(0, 10);
        }
        const str = String(value).trim();
        if (!str) return "";
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
        const parsed = new Date(str);
        return Number.isNaN(parsed.getTime()) ? "" : parsed.toISOString().slice(0, 10);
      }

      function normalizeHeader(value) {
        return String(value || "").replace(/\s+/g, "").replace(/["'׳״]/g, "").toLowerCase();
      }

      function parseIncomesSheet(rows) {
        const headers = rows[0] || [];
        const map = headers.map(normalizeHeader);
        const idx = {
          date: map.findIndex((h) => h.includes("מועד") || h.includes("תאריך")),
          fund: map.findIndex((h) => h.includes("מימון")),
          detail: map.findIndex((h) => h.includes("פירוט")),
          amount: map.findIndex((h) => h.includes("סכום"))
        };
        return rows.slice(1).map((r, i) => {
          const date = excelDateToISO(r[idx.date]);
          if (!date || !r[idx.amount]) return null;
          const d = new Date(date);
          return {
            id: `inc-${i}-${date}`,
            year: d.getFullYear(), month: d.getMonth() + 1, day: d.getDate(),
            date, fund: String(r[idx.fund] || ""), detail: String(r[idx.detail] || ""), amount: Number(r[idx.amount] || 0)
          };
        }).filter(Boolean);
      }

      function parseExpensesSheet(rows) {
        const headers = rows[0] || [];
        const normalized = headers.map(normalizeHeader);
        const dayCol = normalized.findIndex((h) => h.includes("יום"));
        const detailCol = normalized.findIndex((h) => h.includes("פירוט"));
        const monthCols = headers.map((h, idx) => ({ h, idx })).map(({ h, idx }) => {
          const n = normalizeHeader(h);
          const byName = Object.entries(monthKeyMap).find(([name]) => normalizeHeader(name) === n);
          const byNum = /^([1-9]|1[0-2])$/.test(String(h).trim()) ? Number(String(h).trim()) : null;
          return { idx, month: byName ? byName[1] : byNum };
        }).filter((x) => x.month);

        const currentYear = new Date().getFullYear();
        const records = [];
        rows.slice(1).forEach((r, rowIdx) => {
          const detail = String(r[detailCol] || "").trim();
          if (!detail) return;
          const rawDay = Number(r[dayCol]);
          monthCols.forEach(({ idx, month }) => {
            const amount = Number(r[idx]);
            if (!amount) return;
            const day = Number.isFinite(rawDay) && rawDay > 0 ? rawDay : null;
            const date = day ? `${currentYear}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}` : "";
            records.push({
              id: `exp-${rowIdx}-${month}`,
              year: currentYear, month, day, date,
              detail, amount
            });
          });
        });
        return records;
      }

      function parseBankSheet(rows) {
        const headers = rows[0] || [];
        const map = headers.map(normalizeHeader);
        const idx = {
          date: map.findIndex((h) => h.includes("תאריך")),
          incomeAmount: map.findIndex((h) => h.includes("סכוםהכנסות") || h.includes("הכנסותסכום")),
          expenseAmount: map.findIndex((h) => h.includes("סכוםהוצאות") || h.includes("הוצאותסכום")),
          bank: map.findIndex((h) => h.includes("יתרה") || h.includes("בנק")),
          incomeDesc: map.findIndex((h) => h.includes("תיאורהכנסה") || h.includes("הכנסהתיאור")),
          expenseDesc: map.findIndex((h) => h.includes("תיאורהוצאה") || h.includes("הוצאהתיאור"))
        };

        return rows.slice(1).map((r) => {
          const date = excelDateToISO(r[idx.date]);
          if (!date) return null;
          const d = new Date(date);
          return {
            date,
            year: d.getFullYear(), month: d.getMonth() + 1, day: d.getDate(),
            incomeAmount: Number(r[idx.incomeAmount] || 0),
            expenseAmount: Number(r[idx.expenseAmount] || 0),
            bank: Number(r[idx.bank] || 0),
            incomeDesc: String(r[idx.incomeDesc] || ""),
            expenseDesc: String(r[idx.expenseDesc] || "")
          };
        }).filter(Boolean).sort((a, b) => a.date.localeCompare(b.date));
      }

      async function handleFile(file) {
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array" });

        const sheetRows = (name) => XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: "" });
        if (!wb.Sheets["גיול"] || !wb.Sheets["הוצאות"] || !wb.Sheets["תזרים יומי"]) {
          alert("חסרים גיליונות חובה: גיול, הוצאות, תזרים יומי");
          return;
        }

        state.incomes = parseIncomesSheet(sheetRows("גיול"));
        state.expenses = parseExpensesSheet(sheetRows("הוצאות"));
        state.bankDaily = parseBankSheet(sheetRows("תזרים יומי"));
        state.expenseBaseline = new Map(state.expenses.map((e) => [e.id, { amount: e.amount, date: e.date }]));

        if (state.selectedMonth !== "all" && !state.expenses.concat(state.incomes).some((r) => r.month === Number(state.selectedMonth))) {
          state.selectedMonth = "all";
        }
        render();
      }

      function monthOptions() {
        const months = new Set([...state.incomes.map((x) => x.month), ...state.expenses.map((x) => x.month), ...state.bankDaily.map((x) => x.month)]);
        return [...months].sort((a, b) => a - b);
      }

      function renderMonthSelect() {
        const el = document.querySelector("#monthSelect");
        const opts = monthOptions();
        el.innerHTML = `<option value="all">כל השנה</option>${opts.map((m) => `<option value="${m}">${MONTHS_HE[m - 1]}</option>`).join("")}`;
        el.value = state.selectedMonth;
      }

      function renderExpenses() {
        const filtered = byMonth(state.expenses).filter((x) => x.date);
        const undated = byMonth(state.expenses).filter((x) => !x.date);
        const html = `
          <div class="section-head">
            <h2>הוצאות צפויות</h2>
            <div class="meta">תקופה: ${state.selectedMonth === "all" ? "כל השנה" : MONTHS_HE[state.selectedMonth - 1]} | שורות: ${filtered.length} | סך הכול: ${formatMoney(sum(filtered, "amount"))}</div>
          </div>
          <div class="compact-table-wrap">
            <table>
              <thead><tr><th>חודש</th><th>מועד</th><th>פירוט</th><th>סכום</th></tr></thead>
              <tbody>
                ${filtered.sort((a, b) => a.date.localeCompare(b.date)).map((e) => `
                  <tr>
                    <td>${MONTHS_HE[e.month - 1]}</td>
                    <td><input type="date" data-exp-date="${e.id}" value="${e.date}" /></td>
                    <td>${e.detail}</td>
                    <td><input type="number" data-exp-amount="${e.id}" value="${e.amount}" /></td>
                  </tr>
                `).join("") || `<tr><td colspan="4">אין נתונים לתקופה.</td></tr>`}
              </tbody>
            </table>
          </div>
          <h3 style="margin:10px 0 6px">הוצאות ללא מועד</h3>
          <div class="undated-list">
            ${undated.map((e) => `
              <div class="undated-item">
                <div>${e.detail}</div>
                <div class="amount-neg">${formatMoney(e.amount)}</div>
                <input type="date" data-exp-date="${e.id}" value="" />
              </div>
            `).join("") || `<div class="meta">אין הוצאות ללא מועד.</div>`}
          </div>
        `;
        document.querySelector("#expensesSection").innerHTML = html;
      }

      function renderIncomes() {
        const filtered = byMonth(state.incomes);
        document.querySelector("#incomesSection").innerHTML = `
          <div class="section-head">
            <h2>הכנסות צפויות</h2>
            <div class="meta">תקופה: ${state.selectedMonth === "all" ? "כל השנה" : MONTHS_HE[state.selectedMonth - 1]} | שורות: ${filtered.length} | סך הכול: ${formatMoney(sum(filtered, "amount"))}</div>
          </div>
          <div class="compact-table-wrap">
            <table>
              <thead><tr><th>חודש</th><th>מועד</th><th>מימון</th><th>פירוט</th><th>סכום</th></tr></thead>
              <tbody>${filtered.sort((a, b) => a.date.localeCompare(b.date)).map((x) => `<tr><td>${MONTHS_HE[x.month - 1]}</td><td>${fmtDate(x.date)}</td><td>${x.fund || "-"}</td><td>${x.detail || "-"}</td><td class="amount-pos">${formatMoney(x.amount)}</td></tr>`).join("") || `<tr><td colspan="5">אין נתונים לתקופה.</td></tr>`}</tbody>
            </table>
          </div>
        `;
      }

      function weekRanges(month, year) {
        const lastDay = new Date(year, month, 0).getDate();
        return [[1,7],[8,14],[15,21],[22,28],[29,lastDay]];
      }

      function renderWeekly() {
        const wrap = document.querySelector("#weeklySection");
        if (state.selectedMonth === "all") {
          wrap.hidden = true;
          return;
        }
        wrap.hidden = false;
        const month = Number(state.selectedMonth);
        const year = (byMonth(state.expenses)[0] || byMonth(state.incomes)[0] || { year: new Date().getFullYear() }).year;
        const ranges = weekRanges(month, year);
        const exp = byMonth(state.expenses).filter((x) => x.date);
        const inc = byMonth(state.incomes);

        const weekData = ranges.map(([start, end], idx) => {
          const inRange = (r) => r.day >= start && r.day <= end;
          const eRows = exp.filter(inRange);
          const iRows = inc.filter(inRange);
          const eSum = sum(eRows, "amount");
          const iSum = sum(iRows, "amount");
          return { idx: idx + 1, start, end, eRows, iRows, eSum, iSum, net: iSum - eSum };
        });

        wrap.innerHTML = `
          <div class="section-head"><h2>פירוק שבועי (${MONTHS_HE[month - 1]})</h2><div class="meta">איחוד לפי טווח תאריכים של שבוע בלבד.</div></div>
          <div class="weekly-cards">
            ${weekData.map((w) => `<div class="week-card"><div class="week-range">${w.start}-${w.end}</div><div class="amount-neg">הוצאות: ${formatMoney(w.eSum)}</div><div class="amount-pos">הכנסות: ${formatMoney(w.iSum)}</div><div class="${w.net >= 0 ? "amount-pos" : "amount-neg"}">נטו: ${formatMoney(w.net)}</div></div>`).join("")}
          </div>
          <div class="weekly-list">
            ${weekData.map((w) => `
              <details>
                <summary>שבוע ${w.idx} | ${w.start}-${w.end} | הוצאות ${formatMoney(w.eSum)} | הכנסות ${formatMoney(w.iSum)} | נטו ${formatMoney(w.net)}</summary>
                <div class="week-grid">
                  <div class="compact-table-wrap">
                    <table><thead><tr><th>מועד</th><th>פירוט</th><th>סכום</th></tr></thead><tbody>${w.eRows.map((r) => `<tr><td>${fmtDate(r.date)}</td><td>${r.detail}</td><td class="amount-neg">${formatMoney(r.amount)}</td></tr>`).join("") || `<tr><td colspan="3">אין הוצאות</td></tr>`}</tbody></table>
                  </div>
                  <div class="compact-table-wrap">
                    <table><thead><tr><th>מועד</th><th>מימון</th><th>פירוט</th><th>סכום</th></tr></thead><tbody>${w.iRows.map((r) => `<tr><td>${fmtDate(r.date)}</td><td>${r.fund || "-"}</td><td>${r.detail || "-"}</td><td class="amount-pos">${formatMoney(r.amount)}</td></tr>`).join("") || `<tr><td colspan="4">אין הכנסות</td></tr>`}</tbody></table>
                  </div>
                </div>
              </details>
            `).join("")}
          </div>
        `;
      }

      function computeBankSeries() {
        const filteredDaily = state.selectedMonth === "all" ? state.bankDaily : state.bankDaily.filter((r) => r.month === Number(state.selectedMonth));
        const rows = filteredDaily.map((r) => ({ ...r }));
        if (!rows.length) return [];

        // TODO: כאשר תוגדר מדיניות רשמית, להחליט אם התאמות הוצאות חלות רק מהיום והלאה או על כל הטווח.
        const deltaByDate = new Map();
        for (const e of state.expenses) {
          if (!e.date) continue;
          const base = state.expenseBaseline.get(e.id);
          if (!base) continue;
          const amountDelta = Number(e.amount || 0) - Number(base.amount || 0);
          const movedOut = base.date && base.date !== e.date ? Number(base.amount || 0) : 0;
          const movedIn = base.date !== e.date ? Number(e.amount || 0) : 0;
          if (amountDelta !== 0 || movedOut || movedIn) {
            if (base.date) deltaByDate.set(base.date, (deltaByDate.get(base.date) || 0) - movedOut - amountDelta);
            deltaByDate.set(e.date, (deltaByDate.get(e.date) || 0) + movedIn + (base.date === e.date ? amountDelta : 0));
          }
        }

        let accDelta = 0;
        return rows.map((r) => {
          accDelta += deltaByDate.get(r.date) || 0;
          return { ...r, adjustedBank: r.bank - accDelta };
        });
      }

      function renderBank() {
        const series = computeBankSeries();
        const scopeLabel = state.selectedMonth === "all" ? "סוף התקופה" : "סוף החודש";
        if (!series.length) {
          document.querySelector("#bankSection").innerHTML = `<h2>תזרים בנק</h2><div class="meta">אין נתוני תזרים יומי להצגה.</div>`;
          return;
        }

        const today = series.findLast((x) => x.date <= new Date().toISOString().slice(0, 10)) || series[0];
        const end = series[series.length - 1];
        const min = series.reduce((m, r) => r.adjustedBank < m.adjustedBank ? r : m, series[0]);
        const change = end.adjustedBank - series[0].adjustedBank;

        document.querySelector("#bankSection").innerHTML = `
          <div class="section-head"><h2>תזרים בנק</h2><div class="meta">מקור אמת: גיליון תזרים יומי + התאמות עריכה מהמסך.</div></div>
          <div class="bank-kpis">
            <div class="kpi"><div class="kpi-title">עו"ש TODAY</div><div class="kpi-value ${today.adjustedBank >= 0 ? "amount-pos" : "amount-neg"}">${formatMoney(today.adjustedBank)}</div></div>
            <div class="kpi"><div class="kpi-title">תחזית ${scopeLabel}</div><div class="kpi-value ${end.adjustedBank >= 0 ? "amount-pos" : "amount-neg"}">${formatMoney(end.adjustedBank)}</div></div>
            <div class="kpi"><div class="kpi-title">הנקודה הנמוכה ביותר</div><div class="kpi-value ${min.adjustedBank >= 0 ? "amount-pos" : "amount-neg"}">${formatMoney(min.adjustedBank)}</div><div class="hint">${fmtDate(min.date)}</div></div>
            <div class="kpi"><div class="kpi-title">שינוי בתקופה</div><div class="kpi-value ${change >= 0 ? "amount-pos" : "amount-neg"}">${formatMoney(change)}</div></div>
          </div>
          <div class="bank-grid">
            <div><canvas id="bankCanvas" width="760" height="280"></canvas></div>
            <div class="movement-list">${renderMovementRows(series)}</div>
          </div>
        `;
        drawBankChart(series);
      }

      function renderMovementRows(series) {
        const rows = series.map((r) => {
          const net = Number(r.incomeAmount || 0) - Number(r.expenseAmount || 0);
          const desc = [r.incomeDesc ? `הכנסה: ${r.incomeDesc}` : "", r.expenseDesc ? `הוצאה: ${r.expenseDesc}` : ""].filter(Boolean).join(" | ") || "-";
          return `<div class="movement-item"><div>${fmtDate(r.date)}</div><div>${desc}</div><div class="${net >= 0 ? "amount-pos" : "amount-neg"}">${formatMoney(net)}</div><div class="${r.adjustedBank >= 0 ? "amount-pos" : "amount-neg"}">${formatMoney(r.adjustedBank)}</div></div>`;
        });
        return `<div class="movement-item" style="font-weight:700;background:#f7f9fc"><div>תאריך</div><div>תיאור</div><div>השפעה נטו</div><div>יתרה אחרי תנועה</div></div>${rows.join("")}`;
      }

      function drawBankChart(series) {
        const canvas = document.querySelector("#bankCanvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const values = series.map((r) => r.adjustedBank);
        const minV = Math.min(...values, 0);
        const maxV = Math.max(...values, 0);
        const pad = 40;
        const graphW = canvas.width - pad * 2;
        const graphH = canvas.height - pad * 2;
        const x = (i) => pad + (i / Math.max(1, series.length - 1)) * graphW;
        const y = (v) => pad + (1 - (v - minV) / ((maxV - minV) || 1)) * graphH;

        ctx.strokeStyle = "#dde5ef";
        for (let i = 0; i <= 5; i++) {
          const yy = pad + (graphH / 5) * i;
          ctx.beginPath(); ctx.moveTo(pad, yy); ctx.lineTo(canvas.width - pad, yy); ctx.stroke();
        }

        ctx.strokeStyle = "#444";
        ctx.setLineDash([5, 4]);
        ctx.beginPath(); ctx.moveTo(pad, y(0)); ctx.lineTo(canvas.width - pad, y(0)); ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = "#2e5f99";
        ctx.lineWidth = 2;
        ctx.beginPath();
        series.forEach((r, i) => i ? ctx.lineTo(x(i), y(r.adjustedBank)) : ctx.moveTo(x(i), y(r.adjustedBank)));
        ctx.stroke();

        series.forEach((r, i) => {
          ctx.fillStyle = r.adjustedBank >= 0 ? "#147a43" : "#bf2f3b";
          ctx.beginPath(); ctx.arc(x(i), y(r.adjustedBank), 3, 0, Math.PI * 2); ctx.fill();
        });
      }

      function bindEvents() {
        document.querySelector("#fileInput").addEventListener("change", (e) => {
          if (e.target.files?.[0]) handleFile(e.target.files[0]);
        });
        document.querySelector("#monthSelect").addEventListener("change", (e) => {
          state.selectedMonth = e.target.value;
          render();
        });

        document.body.addEventListener("input", (e) => {
          const dateId = e.target.getAttribute("data-exp-date");
          const amountId = e.target.getAttribute("data-exp-amount");
          if (!dateId && !amountId) return;
          const id = dateId || amountId;
          const row = state.expenses.find((x) => x.id === id);
          if (!row) return;

          if (dateId) {
            row.date = e.target.value;
            if (row.date) {
              const d = new Date(row.date);
              row.year = d.getFullYear();
              row.month = d.getMonth() + 1;
              row.day = d.getDate();
            } else {
              row.day = null;
            }
          }
          if (amountId) row.amount = Number(e.target.value || 0);
          render();
        });
      }

      function render() {
        renderMonthSelect();
        renderExpenses();
        renderIncomes();
        renderWeekly();
        renderBank();
      }

      bindEvents();
      render();
    </script>
  </body>
</html>
