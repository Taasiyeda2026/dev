<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מערכת ניהול Zoom - תעשיידע</title>
<style>
:root{
  --bg1:#eef2ff;
  --bg2:#f8fafc;
  --panel:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --muted:#64748b;
  --accent:#6366f1;
  --danger:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Heebo, Segoe UI, sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 20% 20%, #c7d2fe 0%, transparent 40%),
    radial-gradient(circle at 80% 10%, #bae6fd 0%, transparent 40%),
    linear-gradient(180deg,#eef2ff,#f8fafc);
}

.layout{
  width:100%;
  max-width:1280px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
}

.container{
  direction:rtl;
  width:100%;
  max-width:1100px;
  padding:30px;
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius:22px;
  box-shadow:
    0 25px 70px rgba(0,0,0,0.12),
    0 8px 20px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin:0 0 18px;
  color:#4338ca;
  font-size:24px;
  font-weight:900;
  letter-spacing:.4px;
  font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
}

.title-main{ color:#1e3a8a; }

.toolbar{
  background:white;
  border-radius:14px;
  padding:14px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.toolbar input,.toolbar select{
  padding:8px 14px;
  border-radius:12px;
  border:1px solid #dbe3f0;
  font-family:inherit;
  font-size:13px;
  background: linear-gradient(180deg, #ffffff, #f4f7ff);
  outline:none;
  transition: all .15s ease;
  box-shadow:
    0 8px 18px rgba(15,23,42,0.10),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.toolbar input:hover,.toolbar select:hover{
  box-shadow:
    0 10px 22px rgba(15,23,42,0.14),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.toolbar input:focus,.toolbar select:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

.btn{
  padding:9px 18px;
  border-radius:12px;
  border:1px solid #c7d2fe;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
  cursor:pointer;
  font-weight:800;
  font-size:13px;
  color:#3730a3;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition: all .15s ease;
}

.btn:hover{
  transform: translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.btn:active{
  transform: translateY(1px);
  box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

.btn-danger{
  border-color: rgba(239,68,68,0.3);
  background: linear-gradient(180deg,#fff,#fee2e2);
  color:#991b1b;
}

.board-wrap{
  background:white;
  border-radius:16px;
  overflow:auto;
  padding:8px;
  box-shadow:
    0 20px 40px rgba(0,0,0,0.12),
    0 4px 10px rgba(0,0,0,0.06);
}

.board{
  display:grid;
  grid-template-columns:90px repeat(6, 120px);
  min-width:860px;
}

.head-cell{
  position: sticky;
  top: 0;
  z-index: 3;
  background:linear-gradient(180deg,#e0e7ff,#c7d2fe);
  border-bottom:1px solid var(--border);
  border-left:1px solid var(--border);
  text-align:center;
  font-weight:900;
  font-size:17px;
  padding:10px 6px;
  color:#3730a3;
}

.time-cell{
  position: sticky;
  right: 0;
  z-index: 2;
  background:#f1f5ff;
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  text-align:center;
  font-weight:900;
  font-size:12px;
  padding:7px;
}

.slot{
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  min-height:70px;
  padding:6px;
  position:relative;
  transition: all .15s ease;
  background:white;
}

.slot:nth-child(odd){ background:#fbfdff; }

.slot:hover{
  background:#eef2ff;
  box-shadow: inset 0 0 0 1px #c7d2fe;
}

.event-card{
  position:relative;
  z-index:2;
  border-radius:10px;
  padding:7px;
  font-size:11px;
  color:#1e293b;
  margin-bottom:5px;
  cursor:pointer;
  font-weight:800;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 6px 14px rgba(0,0,0,0.25);
  transition: all .15s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.event-card:hover{ transform: scale(1.06); }

.add-btn{
  position:absolute;
  top:4px;
  left:6px;
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid rgba(255,255,255,0.95);
  border-radius:50%;
  background:rgba(255,255,255,0.18);
  backdrop-filter: blur(2px);
  font-weight:900;
  font-size:18px;
  cursor:pointer;
  opacity:0;
  transform:scale(0.65);
  z-index:6;
  transition: opacity .18s ease, transform .18s ease;
}

.slot:hover .add-btn{ opacity:1; transform:scale(1); }

.modal-backdrop{
  position:fixed;
  inset:0;
  background: rgba(15,23,42,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding: 14px;
}

.modal{
  width:min(320px,90vw);
  background:white;
  border-radius:16px;
  box-shadow:0 25px 60px rgba(0,0,0,0.30);
  overflow:hidden;
}

.modal-header{
  padding:10px 14px;
  background:linear-gradient(180deg,#e0e7ff,#c7d2fe);
  font-weight:900;
  font-size:14px;
  color:#3730a3;
  text-align:center;
}

.modal-body{ padding:12px 14px; display:grid; gap:10px; }

/* הגדלת גובה תיבות הרשימה (בחירת מדריך וכו') */
.modal-body select{
  height:44px;
  font-size:14px;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid #dbe3f0;
  background:#ffffff;
}

.modal-actions{
  padding:14px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:center;
  gap:12px;
  background:#fafbff;
}

.zoom-side{
  position:fixed;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  z-index:100;
}

.zoom-side-note{
  margin:0;
  text-align:center;
  font-size:11px;
  line-height:1.25;
  color:#475569;
  font-weight:700;
  max-width:88px;
}

.save-container{
  position:fixed;
  bottom:25px;
  left:25px;
  z-index:999;
}

.save-status{
  position:fixed;
  bottom:96px;
  left:25px;
  z-index:1000;
  min-width:190px;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
  opacity:0;
  transform:translateY(6px);
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
}

.save-status.show{
  opacity:1;
  transform:translateY(0);
}

.save-status.loading{ background:#0ea5e9; }
.save-status.success{ background:#16a34a; }
.save-status.error{ background:#dc2626; }

.save-btn{
  background:#10b981;
  color:white;
  border:none;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.25);
  transition:all 0.2s ease;
}

.save-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.3);
}

.save-btn:active{
  transform:translateY(1px);
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.zoom-btn{
  width:54px;
  height:54px;
  font-size:17px;
  font-weight:900;
  border-radius:10px;
  cursor:pointer;
  border:2px solid;
  transition:all .15s ease;
  box-shadow:
    0 7px 0 rgba(15,23,42,0.26),
    0 12px 18px rgba(0,0,0,0.22);
}

/* תחושת לחיצה */
.zoom-btn:hover{
  transform:translateY(-1px);
  box-shadow:
    0 8px 0 rgba(15,23,42,0.24),
    0 14px 20px rgba(0,0,0,0.24);
}

.zoom-btn:active{
  transform:translateY(4px);
  box-shadow:
    0 3px 0 rgba(15,23,42,0.24),
    0 5px 10px rgba(0,0,0,0.18);
}

#saveBtn.is-loading{
  transform:translateY(1px);
  box-shadow:0 3px 8px rgba(0,0,0,0.14);
  opacity:.9;
  cursor:wait;
}

/* צבעים שונים */
.zoom1{
  border-color:#10b981;
  background:#d1fae5;
}

.zoom2{
  border-color:#1d4ed8;
  background:#dbeafe;
}

.zoom3{
  border-color:#e11d48;
  background:#fde2e2;
}

.zoomQuick{
  display:flex;
  gap:4px;
  margin-right:6px;
}

.zbtn{
  background:#eef2ff;
  border:1px solid #c7d2fe;
  border-radius:6px;
  font-size:11px;
  padding:2px 6px;
  cursor:pointer;
  font-weight:600;
}

.zbtn:hover{
  background:#c7d2fe;
}

.pill{
  display:inline-flex;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  color:white;
}

.pill.zoom1{ background:#3b82f6; }
.pill.zoom2{ background:#16a34a; }
.pill.zoom3{ background:#9333ea; }

.small-note{ font-size:12px; color:var(--muted); }

.link-popup-body{ padding:16px 14px; display:grid; gap:10px; text-align:center; }

.zoom-link-box{
  border:1px solid #dbe3f0;
  border-radius:10px;
  background:#f8fafc;
  padding:8px;
  font-size:12px;
  line-height:1.5;
  color:#334155;
  word-break:break-all;
}

.btn-compact{ padding:6px 12px; border-radius:10px; font-size:12px; min-width:110px; margin:0 auto; }

/* Tooltip (hover details) */
.tooltip{
  position:fixed;
  z-index:2000;
  display:none;
  max-width:340px;
  background:#0f172a;
  color:#fff;
  padding:10px 12px;
  border-radius:12px;
  font-size:12px;
  line-height:1.4;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  pointer-events:none;
}
.tooltip .t-title{ font-weight:900; margin-bottom:6px; }
.tooltip .t-row{ display:flex; gap:8px; }
.tooltip .t-k{ opacity:.75; min-width:78px; }
.tooltip .t-v{ font-weight:700; }
.tooltip hr{ border:none; border-top:1px solid rgba(255,255,255,.18); margin:8px 0; }
.tooltip ul{ margin:6px 0 0; padding:0 18px 0 0; }
.tooltip li{ margin:2px 0; }


.view{ display:none; }
.view.active{ display:block; }

.potential-btn{
  background:#6366f1;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
  transition:0.2s;
  font-weight:800;
}

.potential-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

.potential-title{
  margin:0 0 14px;
  font-size:20px;
  color:#312e81;
  text-align:right;
}

.potential-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.potential-tab{
  border:1px solid #c7d2fe;
  background:#eef2ff;
  color:#3730a3;
  border-radius:999px;
  padding:6px 14px;
  cursor:pointer;
  font-weight:700;
}

.potential-tab.active{
  background:#6366f1;
  color:#fff;
}

.potential-table-wrap{
  background:white;
  border-radius:10px;
  overflow:auto;
}

.potential-table{
  width:100%;
  border-collapse:collapse;
  background:white;
  min-width:920px;
}

.potential-table th,.potential-table td{
  padding:10px;
  text-align:right;
  border-bottom:1px solid #eee;
}

.potential-table .time-col{
  width:110px;
}

.potential-table .notes-col{
  width:260px;
}

.potential-table tbody tr:nth-child(even){
  background:#fafbff;
}

.potential-table tbody tr:hover{
  background:#f3f4f6;
}

.potential-table tbody tr td{ vertical-align:middle; }

.notes-field{
  width:100%;
  border:1px solid #dbe3f0;
  border-radius:8px;
  padding:7px 10px;
  font-family:inherit;
  font-size:12px;
  min-width:220px;
}

.time-field{
  width:88px;
  max-width:100%;
  border:1px solid #dbe3f0;
  border-radius:8px;
  padding:7px 10px;
  font-family:inherit;
}

.completed-checkbox{
  width:18px;
  height:18px;
  accent-color:#16a34a;
}

.potential-muted{
  color:#64748b;
  padding:12px;
  text-align:center;
}

@media (max-width: 820px){
  .potential-title{ font-size:18px; }
  .container{ padding:18px; }
}

</style>
</head>
<body>

<div class="zoom-side">
  <button class="zoom-btn zoom1" onclick="copyZoomLink(1)">Z1</button>
  <button class="zoom-btn zoom2" onclick="copyZoomLink(2)">Z2</button>
  <button class="zoom-btn zoom3" onclick="copyZoomLink(3)">Z3</button>
  <p class="zoom-side-note">לחצו על חשבון Zoom
    <br>לקבלת הקישור</p>
</div>

<div class="container">
  <h1><span class="title-main">ממשק לניהול חשבונות</span> ZOOM - <span class="title-main">תעשיידע</span></h1>

  <div class="toolbar">
    <input id="searchInstructor" placeholder="חיפוש..." />

    <select id="filterZoom">
      <option value="">ZOOM</option>
      <option value="Zoom1">Zoom1</option>
      <option value="Zoom2">Zoom2</option>
      <option value="Zoom3">Zoom3</option>
    </select>

    <button id="clearBtn" class="btn btn-danger" type="button">RESET</button>
    <button id="potentialNavBtn" class="potential-btn" type="button">פוטנציאל</button>
  </div>

  <div id="scheduleView" class="view active">
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div id="potentialView" class="view">
    <h2 class="potential-title">פוטנציאל</h2>
    <div id="potentialTabs" class="potential-tabs"></div>
    <div class="potential-table-wrap">
      <table class="potential-table">
        <thead>
          <tr>
            <th>Authority</th>
            <th>School</th>
            <th>Program</th>
            <th>Employee</th>
            <th class="time-col">StartTime</th>
            <th class="time-col">EndTime</th>
            <th class="notes-col">Notes</th>
            <th>Completed</th>
          </tr>
        </thead>
        <tbody id="potentialTableBody"></tbody>
      </table>
      <div id="potentialEmpty" class="potential-muted" style="display:none">אין פעילויות לתאריך זה.</div>
    </div>
  </div>
</div>

<div class="save-container">
  <button class="save-btn" type="button" onclick="handleManualSave()">שמור</button>
</div>

<div id="saveStatus" class="save-status" aria-live="polite"></div>

<div id="assignModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header" id="modalTitle">שיבוץ מדריך</div>

    <div class="modal-body">
      <div style="font-weight:800;font-size:14px;text-align:center">
        <span id="modalDay"></span> · <span id="modalTime"></span>
      </div>

      <select id="modalInstructor"></select>

      <select id="modalSchool"></select>

      <select id="modalCourse"></select>

      <div style="text-align:center">
        <div style="font-size:12px;color:#64748b">Zoom שיוקצה:</div>
        <div class="pill" id="zoomSuggestion"></div>
      </div>

      <div id="modalStatus" style="text-align:center;color:#b91c1c;font-weight:800"></div>
    </div>

    <div class="modal-actions">
      <button id="cancelBtn" class="btn" type="button">ביטול</button>
      <button id="saveBtn" class="btn" type="button">שמור</button>
    </div>
  </div>
</div>

<script>
/*
  תיקון לפי השרת החדש (Google Apps Script):
  - שימוש ב-action: add / delete / clear
  - שמירת zoomLink בגוגל שיט
  - מחיקה אמיתית לפי id (ולא רק מחיקה מקומית)
  - שמירה על כל הלוגיקה המקורית של חפיפות/הצעות Zoom/פילטרים
*/

// ימים בעברית
const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי"];

// סדר שעות: 1 שעה ואז 2 שעות (מוקדם עד מאוחר)
// שעות של שעה אחת
const ONE_HOUR_SLOTS = [
  "08:00-09:00",
  "09:00-10:00",
  "10:00-11:00",
  "11:00-12:00",
  "12:00-13:00",
  "13:00-14:00",
  "14:00-15:00",
  "15:00-16:00",
  "16:00-17:00"
];

// שעות של שעתיים
const TWO_HOUR_SLOTS = [
  "08:00-10:00",
  "10:00-12:00",
  "12:00-14:00",
  "14:00-16:00"
];

// כל השעות למערכת
const TIME_SLOTS = [...ONE_HOUR_SLOTS, ...TWO_HOUR_SLOTS];

const ZOOMS = ["Zoom1","Zoom2","Zoom3"];
const ZOOM_LINKS = {
  Zoom1: "https://zoom.us/j/6023602336?omn=96962875568",
  Zoom2: "https://zoom.us/j/7601360450?omn=98989531483",
  Zoom3: "https://zoom.us/j/5274325600?omn=96368524491"
};

// מדריכים
const instructors = [
  "הנאא אבו אמזה","הילה רוזן","ראנה סאלח","סוהא סאלם","מיכל שכטמן","אלדר מיכאל טייב",
  "אביגדור שרון","אסיל ג'בר","אביב בלנדר","ברקת קטעי","ליאל בן חמו","אלכס זפקה",
  "אפרת אוחיון","עליזה מולה","כרמית סמנדרוב","קרן גורביץ","אוריה פדידה","אילנה טיטייבסקי"
].sort((a,b)=>a.localeCompare(b,'he'));

// שיוך מדריך -> בית ספר/מוסד + קורס (זה המידע הקבוע שנתת)
// כרגע אין שדה "רשות" נפרד בנתונים, לכן אנחנו מציגים את "בית הספר/המוסד" כפי שהוא.
const INSTRUCTOR_ASSIGNMENTS = {
  "אביב בלנדר": [
    { school: "מתנ\"ס", course: "תלמידים להייטק" },
    { school: "תל-חי", course: "ביומימיקרי" },
    { school: "מצודות", course: "ביומימיקרי" }
  ],
  "אוריה פדידה": [
    { school: "טשרניחובסקי", course: "בינה מלאכותית" },
    { school: "אורט גוטמן", course: "תמיר - איפה דדי?" }
  ],
  "אושרי רם": [
    { school: "טשרניחובסקי", course: "בינה מלאכותית" }
  ],
  "אילנה טיטייבסקי": [
    { school: "גולדה", course: "ביומימיקרי" },
    { school: "ישיבת אבירי יעקב", course: "השמיים אינם הגבול" },
    { school: "רמב\"ם", course: "בינה מלאכותית" }
  ],
  "אלדר מיכאל טייב": [
    { school: "בי\"ס אילנות", course: "ביומימיקרי" },
    { school: "בראשית", course: "ביומימיקרי" },
    { school: "התומר", course: "בינה מלאכותית" },
    { school: "מקיף אמית", course: "פרימיום" },

function firstDefined(obj, keys){
  for(const key of keys){
    const val = obj?.[key];
    if(val !== undefined && val !== null && String(val).trim() !== '') return String(val);
  }
  return '';
}

function normalizeEvent(raw){
  return {
    ...raw,
    day: firstDefined(raw, ['day','Day','יום']),
    time: firstDefined(raw, ['time','Time','שעה']),
    instructor: firstDefined(raw, ['instructor','Instructor','מדריך']),
    zoom: firstDefined(raw, ['zoom','Zoom','חשבון Zoom']),
    school: firstDefined(raw, ['school','schoolName','school_name','organization','org','בית ספר']),
    course: firstDefined(raw, ['course','courseName','course_name','קורס']),
    authority: firstDefined(raw, ['authority','city','municipality','רשות'])
  };
}

function getInstructorAssignments(name){
  const list = INSTRUCTOR_ASSIGNMENTS[name] || [];
  const uniq = [];
  const seen = new Set();
  for(const item of list){
    const key = `${item.school}||${item.course}`;
    if(seen.has(key)) continue;
    seen.add(key);
    uniq.push(item);
  }
  return uniq;
}

function buildTooltipHtml(ev){
  const day = ev.day || '';
  const time = ev.time || '';
  const instructor = ev.instructor || '';

  const directSchool = firstDefined(ev, ['school','schoolName','school_name','organization','org','בית ספר']);

  }else{
    // אם אין נתוני בית ספר/קורס על השיבוץ עצמו, נופלים לנתוני ברירת המחדל של המדריך.
    const list = getInstructorAssignments(instructor);

    if(list.length === 1){
      metaHtml += `<div class="t-title">פרטי השיבוץ</div>`;
      metaHtml += `<div class="t-row"><div class="t-k">בית ספר</div><div class="t-v">${escHtml(list[0].school)}</div></div>`;
      metaHtml += `<div class="t-row"><div class="t-k">קורס</div><div class="t-v">${escHtml(list[0].course)}</div></div>`;
    }else if(list.length > 1){
      metaHtml += `<div class="t-title">פרטי השיבוץ</div>`;
      metaHtml += `<div style="opacity:.85">פרטי בית הספר/הקורס לא נשמרו בשיבוץ הזה.</div>`;
      metaHtml += `<div style="opacity:.85">שיוכים אפשריים למדריך:</div>`;
      metaHtml += `<ul>${list.map(item => `<li>${escHtml(item.school)} · ${escHtml(item.course)}</li>`).join('')}</ul>`;
    }else{
      metaHtml += `<div class="t-title">פרטי השיבוץ</div>`;
      metaHtml += `<div style="opacity:.85">אין שיוך בית ספר/קורס עבור מדריך זה ברשימה.</div>`;
    }
  }

  return `
    <div class="t-row"><div class="t-k">מדריך</div><div class="t-v">${escHtml(instructor)}</div></div>
    <div class="t-row"><div class="t-k">זום</div><div class="t-v">${escHtml(zoom)}</div></div>
    <div class="t-row"><div class="t-k">יום/שעה</div><div class="t-v">${escHtml(day)} · ${escHtml(time)}</div></div>
    <hr />
    ${metaHtml}
  `;
}

function positionTooltip(x, y){
  const pad = 12;
  const rect = tooltipEl.getBoundingClientRect();
  let left = x + pad;
  let top = y + pad;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  if(left + rect.width + 10 > vw) left = Math.max(10, vw - rect.width - 10);
  if(top + rect.height + 10 > vh) top = Math.max(10, vh - rect.height - 10);

  tooltipEl.style.left = left + 'px';
  tooltipEl.style.top = top + 'px';
}

function showTooltip(ev, x, y){
  tooltipEl.innerHTML = buildTooltipHtml(ev);
  tooltipEl.style.display = 'block';
  requestAnimationFrame(() => positionTooltip(x, y));
}

function hideTooltip(){
  tooltipEl.style.display = 'none';
}

// --- Utilities ---
function toMinutes(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60 + m;
}

function parseSlot(slot){
  const [start, end] = slot.split('-');
  return { start: toMinutes(start), end: toMinutes(end) };
}

function slotsOverlap(a, b){
  const s1 = parseSlot(a);
  const s2 = parseSlot(b);
  return s1.start < s2.end && s2.start < s1.end;
}

function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function enc(s){ return encodeURIComponent(String(s)); }
function dec(s){ return decodeURIComponent(String(s || '')); }

function getSearchTerm(){
  const term = (searchEl.value || '').trim().toLowerCase();
  return term.length >= 3 ? term : '';
}

function eventMatchesFilters(ev){
  const term = getSearchTerm();
  const zoom = zoomFilterEl.value;

  if(term){
    const t = (ev.instructor || '').toLowerCase();
    if(!t.includes(term)) return false;
  }

  if(zoom && ev.zoom !== zoom) return false;
  return true;
}

function getEventsInCell(day, time){
  return schedule.filter(e => e.day === day && e.time === time);
}

function isZoomFree(day, time, zoom){
  return !schedule.some(e => e.day === day && e.zoom === zoom && slotsOverlap(e.time, time));
}

function isInstructorFree(day, time, instructor){
  return !schedule.some(e => e.day === day && e.instructor === instructor && slotsOverlap(e.time, time));
}

function pickZoomForSlot(day, time, instructor=null){
  // מקסימום 3 באותה משבצת זמן זהה
  const usedNowExact = getEventsInCell(day, time).map(e => e.zoom);
  const availableExact = ZOOMS.filter(z => !usedNowExact.includes(z));
  if(availableExact.length === 0) return null;

  // וגם פנוי מבחינת חפיפה
  const available = availableExact.filter(z => isZoomFree(day, time, z));
  if(available.length === 0) return null;

  const idx = TIME_SLOTS.indexOf(time);

  // עדיפות 1: אם אותו מדריך לימד במשבצת הקודמת, תן לו את אותו Zoom (אם פנוי)
  if(instructor && idx > 0){
    const prevTime = TIME_SLOTS[idx - 1];
    const prev = schedule.find(e => e.day===day && e.time===prevTime && e.instructor===instructor);
    if(prev && available.includes(prev.zoom)) return prev.zoom;
  }

  // עדיפות 2: Zoom שלא היה במשבצת הזמן הקודמת
  let usedPrev = [];
  if(idx > 0){
    const prevTime = TIME_SLOTS[idx - 1];
    usedPrev = getEventsInCell(day, prevTime).map(e => e.zoom);
  }

  const preferred = available.find(z => !usedPrev.includes(z));
  return preferred || available[0];
}

async function saveData(){
  showSaveStatus('אנא המתן....', 'loading');

  try{
    for(const id of pendingPotentialUpdates){

      const row = potentialData.find(item => item.id === id);
      if(!row) continue;

      const tr = Array.from(potentialTableBodyEl.querySelectorAll('tr[data-id]')).find(item => item.dataset.id === String(id));
      const startTime = tr ? tr.querySelector(".startTime-field").value : row.startTime;
      const endTime = tr ? tr.querySelector(".endTime-field").value : row.endTime;
      const notes = row.notes;
      const completed = row.completed;

      const updatePayload = {
        action:"updatepotential",
        id:row.id,
        startTime:startTime,
        endTime:endTime,
        notes:notes,
        completed:completed
      };

      row.startTime = updatePayload.startTime;
      row.endTime = updatePayload.endTime;
      row.notes = updatePayload.notes;
      row.completed = updatePayload.completed;

      await fetch(API_URL,{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          action:"updatepotential",
          id:row.id,
          startTime:row.startTime,
          endTime:row.endTime,
          notes:row.notes,
          completed:row.completed
        })
      });

    }

    pendingPotentialUpdates.clear();
    showSaveStatus('שמירה בוצעה בהצלחה', 'success', 1800);
  }catch(err){
    showSaveStatus('שגיאה בשמירה', 'error', 2200);
    throw err;
  }
}

    saveStatusHideTimer = null;

  saveStatusEl.textContent = message;

  if(autoHideMs > 0){
    saveStatusHideTimer = setTimeout(()=>{
      saveStatusEl.className = 'save-status';
      saveStatusHideTimer = null;

  }
}

    2: ZOOM_LINKS.Zoom2,
    3: ZOOM_LINKS.Zoom3
  };

  const quickLink = Number.isInteger(num) ? quickLinks[num] : '';
  if(!quickLink) return;

  const textToCopy = `להצטרפות לזום לחצו:
${quickLink}`;

  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(textToCopy);
    }else{
      const area = document.createElement('textarea');
      area.value = textToCopy;
      document.body.appendChild(area);

      document.execCommand('copy');
      document.body.removeChild(area);

async function saveAssignment(){
  const day = modalState.day;
  const time = modalState.time;

  if(!day || !time){
    modalStatusEl.textContent = 'שגיאה: חסר יום/שעה.';
    return;
  }

  const instructor = modalInstructorEl.value;
  if(!instructor){
    modalStatusEl.textContent = 'יש לבחור מדריך.';
    return;
  }

  if(!isInstructorFree(day, time, instructor)){
    modalStatusEl.textContent = 'המדריך כבר משובץ בזמן חופף.';
    return;
  }

  const zoom = pickZoomForSlot(day, time, instructor);
  const school = modalSchoolEl.value || '';
  const course = modalCourseEl.value || '';
  if(!zoom){
    modalStatusEl.textContent = 'אין חשבון Zoom פנוי בשעה זו.';
    return;
  }

  // לא לשבץ אותו Zoom באותה משבצת (זהה)
  if(getEventsInCell(day, time).some(e => e.zoom === zoom)){
    modalStatusEl.textContent = 'חשבון Zoom זה כבר משובץ במשבצת זו.';
    return;
  }

  setSaveBtnLoading(true);

  try{
    await addItem(day, time, instructor, zoom, school, course);
    closeModal();
    render();
  }catch(err){
    modalStatusEl.textContent = 'שגיאה בשמירה. בדוק הרשאות/פריסה של הסקריפט.';
    console.error(err);
  }finally{
    setSaveBtnLoading(false);
  }
}

// --- Render ---
function render(){
  boardEl.innerHTML = '';

  boardEl.insertAdjacentHTML('beforeend', `<div class="head-cell">שעה</div>`);
  DAYS.forEach(d => boardEl.insertAdjacentHTML('beforeend', `<div class="head-cell">${escHtml(d)}</div>`));

  TIME_SLOTS.forEach((time,idx) => {

    // ✅ הפרדה ויזואלית בין שעות של שעה לשעות של שעתיים
    if(idx === ONE_HOUR_SLOTS.length){
      boardEl.insertAdjacentHTML('beforeend', `<div class="time-cell" style="background:#e2e8f0;font-weight:900">—</div>`);
      DAYS.forEach(()=> boardEl.insertAdjacentHTML('beforeend', `<div class="slot" style="background:#e2e8f0;border-top:3px solid #6366f1"></div>`));
    }

    boardEl.insertAdjacentHTML('beforeend', `<div class="time-cell">${escHtml(time)}</div>`);

    DAYS.forEach(day => {
      const cellEvents = getEventsInCell(day, time);
      const visible = cellEvents.filter(eventMatchesFilters);

      const cardsHtml = visible.map(ev => {
        const bg = instructorColors[ev.instructor] || '#e5e7eb';
        return `<div class="event-card"
          data-id="${ev.id ? enc(ev.id) : ''}"
          data-day="${enc(day)}"
          data-time="${enc(time)}"
          data-instructor="${enc(ev.instructor)}"
          data-zoom="${enc(ev.zoom)}"
          data-school="${enc(ev.school || '')}"
          data-course="${enc(ev.course || '')}"
          data-authority="${enc(ev.authority || '')}"
          title="לחץ להסרה"
          style="background:${bg}">
          ${escHtml(ev.instructor)} | ${escHtml(ev.zoom)}
        </div>`;
      }).join('');

      boardEl.insertAdjacentHTML('beforeend',
        `<div class="slot" data-day="${escHtml(day)}" data-time="${escHtml(time)}">
          ${cardsHtml}
          <button class="add-btn" type="button" title="שיבוץ">+</button>
        </div>`
      );
    });
  });

  attachInteractions();
}

function attachInteractions(){
  // הפלוס פותח חלונית
  document.querySelectorAll('.add-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const slot = btn.closest('.slot');
      openModal(slot.dataset.day, slot.dataset.time);
    };
  });

  // לחיצה על שיבוץ קיים = הסרה
  document.querySelectorAll('.event-card').forEach(card => {
    const readEventFromCard = () => ({
      id: card.dataset.id ? dec(card.dataset.id) : null,
      day: dec(card.dataset.day),
      time: dec(card.dataset.time),
      instructor: dec(card.dataset.instructor),
      zoom: dec(card.dataset.zoom),
      school: dec(card.dataset.school),
      course: dec(card.dataset.course),
      authority: dec(card.dataset.authority)
    });

    // Hover tooltip
    card.addEventListener('mouseenter', (e) => {
      const ev = readEventFromCard();
      showTooltip(ev, e.clientX, e.clientY);
    });

    card.addEventListener('mousemove', (e) => {
      if(tooltipEl.style.display === 'block') positionTooltip(e.clientX, e.clientY);
    });

    card.addEventListener('mouseleave', hideTooltip);

  });
}

// מאזין גלובלי עם event delegation למחיקה — יציב יותר גם אחרי render דינמי
boardEl.addEventListener('click', async (e) => {
  const card = e.target.closest('.event-card');
  if(!card || !boardEl.contains(card)) return;

  e.stopPropagation();
  hideTooltip();

  const ev = {
    id: card.dataset.id ? dec(card.dataset.id) : null,
    day: dec(card.dataset.day),
    time: dec(card.dataset.time),
    instructor: dec(card.dataset.instructor),
    zoom: dec(card.dataset.zoom),
    school: dec(card.dataset.school),
    course: dec(card.dataset.course),
    authority: dec(card.dataset.authority)
  };

  const ok = confirm(`להסיר את השיבוץ של ${ev.instructor}?`);
  if(!ok) return;

  try{
    await deleteItemByEvent(ev);
    render();
  }catch(err){
    alert('שגיאה במחיקה. בדוק הרשאות/פריסה של הסקריפט.');
    console.error(err);
  }
});

// --- Controls ---

  if(!confirm('למחוק את כל השיבוצים במערכת?')) return;
  schedule = [];
  searchEl.value = '';
  zoomFilterEl.value = '';

// --- Events / bindings ---
searchEl.addEventListener('input', render);
zoomFilterEl.addEventListener('change', render);
clearBtn.addEventListener('click', clearSystem);

cancelBtn.addEventListener('click', closeModal);
saveBtn.addEventListener('click', saveAssignment);

window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape' && modalBackdrop.style.display === 'flex') closeModal(); });

const modalSchoolEl = document.getElementById('modalSchool');
const modalCourseEl = document.getElementById('modalCourse');

function populateInstructorDetails(){
  const name = modalInstructorEl.value;
  const list = getInstructorAssignments(name);

  modalSchoolEl.innerHTML = "";
  modalCourseEl.innerHTML = "";

  if(!name || list.length===0){
    modalSchoolEl.innerHTML = "<option>בחר בית ספר</option>";

      courses.map(c=>`<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');

const scheduleViewEl = document.getElementById('scheduleView');
const potentialViewEl = document.getElementById('potentialView');
const potentialNavBtn = document.getElementById('potentialNavBtn');
const potentialTabsEl = document.getElementById('potentialTabs');
const potentialTableBodyEl = document.getElementById('potentialTableBody');
const potentialEmptyEl = document.getElementById('potentialEmpty');

function normalizePotentialDate(dateStr){
  const raw = String(dateStr || '').trim();
  const m = raw.match(/^(\d{1,2})[./-](\d{1,2})[./-](\d{2,4})$/);
  if(!m) return raw;
  const dd = m[1].padStart(2,'0');
  const mm = m[2].padStart(2,'0');
  const yyyy = m[3].length === 2 ? `20${m[3]}` : m[3];
  return `${dd}/${mm}/${yyyy}`;
}

function parseCompleted(value){
  if(value === true || value === 1) return true;
  const v = String(value || '').toLowerCase().trim();
  return ['true','1','yes','כן','בוצע','completed'].includes(v);
}

function normalizePotentialTime(value){
  if(value === null || value === undefined) return '';

  if(typeof value === 'number' && Number.isFinite(value)){
    const totalMinutes = Math.round(value * 24 * 60);
    const hh = Math.floor(totalMinutes / 60) % 24;
    const mm = totalMinutes % 60;
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }

  const raw = String(value).trim();
  if(!raw) return '';

  const hhmmMatch = raw.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if(hhmmMatch){
    return `${hhmmMatch[1].padStart(2,'0')}:${hhmmMatch[2]}`;
  }

  const isoTimeMatch = raw.match(/T(\d{2}):(\d{2})(?::\d{2}(?:\.\d+)?)?Z$/i);
  if(isoTimeMatch){
    return `${isoTimeMatch[1]}:${isoTimeMatch[2]}`;
  }

  return raw;
}

function mapPotentialRow(raw){
  return {
    id: firstDefined(raw, ['id','ID','Id']),
    date: normalizePotentialDate(firstDefined(raw, ['Date','date','תאריך'])),
    authority: firstDefined(raw, ['Authority','authority','רשות']),
    school: firstDefined(raw, ['School','school','בית ספר']),
    program: firstDefined(raw, ['Program','program','תוכנית']),
    employee: firstDefined(raw, ['Employee','employee','מדריך']),
    startTime: normalizePotentialTime(raw?.StartTime ?? raw?.startTime ?? raw?.start ?? raw?.['שעת התחלה']),
    endTime: normalizePotentialTime(raw?.EndTime ?? raw?.endTime ?? raw?.end ?? raw?.['שעת סיום']),
    notes: firstDefined(raw, ['Notes','notes','הערות']),
    completed: parseCompleted(raw?.Completed ?? raw?.completed)
  };
}

function renderPotentialTabs(){
  potentialTabsEl.innerHTML = POTENTIAL_DATES.map(tab => (
    `<button class="potential-tab ${tab.value === selectedPotentialDate ? 'active' : ''}" data-date="${tab.value}" type="button">${tab.label}</button>`
  )).join('');

  potentialTabsEl.querySelectorAll('.potential-tab').forEach(btn => {
    btn.addEventListener('click', ()=>{
      selectedPotentialDate = btn.dataset.date;
      renderPotential(potentialData);
    });
  });
}

function filterByDate(data, dateValue){
  const target = normalizePotentialDate(dateValue);
  return data.filter(row => normalizePotentialDate(row.date) === target);
}

function renderPotential(data){
  renderPotentialTabs();
  const rows = filterByDate(data, selectedPotentialDate);

  potentialTableBodyEl.innerHTML = rows.map(row => `
    <tr data-id="${escHtml(row.id)}">
      <td>${escHtml(row.authority)}</td>
      <td>${escHtml(row.school)}</td>
      <td>${escHtml(row.program)}</td>
      <td>${escHtml(row.employee)}</td>
      <td class="time-col"><input type="time" class="startTime-field" value="${escHtml(row.startTime)}"></td>
      <td class="time-col"><input type="time" class="endTime-field" value="${escHtml(row.endTime)}"></td>
      <td class="notes-col"><input class="notes-field" type="text" value="${escHtml(row.notes)}" data-id="${escHtml(row.id)}" /></td>
      <td><input type="checkbox" class="completed-checkbox" data-id="${escHtml(row.id)}" ${row.completed ? 'checked' : ''} /></td>
    </tr>
  `).join('');

  potentialEmptyEl.style.display = rows.length ? 'none' : 'block';

  potentialTableBodyEl.querySelectorAll('tr[data-id]').forEach(tr => {
    const id = tr.dataset.id;
    const startInput = tr.querySelector('.startTime-field');
    const endInput = tr.querySelector('.endTime-field');

    if(startInput){
      startInput.addEventListener('change', (e)=> updatePotentialTime(id, 'startTime', e.target.value));
    }

    if(endInput){
      endInput.addEventListener('change', (e)=> updatePotentialTime(id, 'endTime', e.target.value));
    }
  });

  potentialTableBodyEl.querySelectorAll('.notes-field').forEach(input => {
    input.addEventListener('change', (e)=> updateNotes(e.target.dataset.id, e.target.value));
  });

  potentialTableBodyEl.querySelectorAll('.completed-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', (e)=> toggleCompleted(e.target.dataset.id, e.target.checked));
  });
}

async function loadPotentialData(){
  const res = await fetch(API_URL + '?action=potential');
  const data = await res.json();
  const rows = Array.isArray(data) ? data : (data.data || []);
  potentialData = rows.map(mapPotentialRow);
  pendingPotentialUpdates.clear();
  renderPotential(potentialData);
}

async function updateRow(id, notes, completed){
  const row = potentialData.find(item => item.id === id);
  if(!row) return;

  row.notes = notes;
  row.completed = completed;

  await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      action:"updatepotential",
      id:row.id,
      startTime:row.startTime,
      endTime:row.endTime,
      notes:row.notes,
      completed:row.completed
    })
  });
}

async function updateNotes(id, notes){
  const row = potentialData.find(item => item.id === id);
  if(!row) return;
  row.notes = notes;
  pendingPotentialUpdates.add(id);
}

async function updatePotentialTime(id, field, value){
  const row = potentialData.find(item => item.id === id);
  if(!row || !['startTime','endTime'].includes(field)) return;
  row[field] = value;
  pendingPotentialUpdates.add(id);
}

async function toggleCompleted(id, completed){
  const row = potentialData.find(item => item.id === id);
  if(!row) return;
  row.completed = completed;
  pendingPotentialUpdates.add(id);
}

function openPotentialView(){
  scheduleViewEl.classList.remove('active');
  potentialViewEl.classList.add('active');
  potentialNavBtn.textContent = 'לו"ז';
}

function openScheduleView(){
  potentialViewEl.classList.remove('active');
  scheduleViewEl.classList.add('active');
  potentialNavBtn.textContent = 'פוטנציאל';
}

async function loadPage(view){
  if(view === 'potential'){
    await loadPotentialData();
    openPotentialView();
    return;
  }

  await loadSchedule();
  render();
  openScheduleView();
}

potentialNavBtn.addEventListener('click', async ()=>{
  const isPotentialOpen = potentialViewEl.classList.contains('active');

  try{
    await saveData();
    if(isPotentialOpen){
      await loadPage('schedule');
    }else{
      await loadPage('potential');
    }
  }catch(err){
    if(!isPotentialOpen){
      potentialTableBodyEl.innerHTML = '';
      potentialEmptyEl.style.display = 'block';
      potentialEmptyEl.textContent = 'שגיאה בטעינת נתוני פוטנציאל.';
    }
    console.error(err);
  }
});

// --- Init ---
async function initApp(){
  await loadSchedule();
  render();
  renderPotentialTabs();
}

window.onload = initApp;
</script>
