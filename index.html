<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מערכת ניהול Zoom - תעשיידע</title>
<style>
:root{
  --bg1:#eef2ff;
  --bg2:#f8fafc;
  --panel:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --muted:#64748b;
  --accent:#6366f1;
  --danger:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Heebo, Segoe UI, sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 20% 20%, #c7d2fe 0%, transparent 40%),
    radial-gradient(circle at 80% 10%, #bae6fd 0%, transparent 40%),
    linear-gradient(180deg,#eef2ff,#f8fafc);
}

.container{
  width:100%;
  max-width:1100px;
  padding:30px;
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius:22px;
  box-shadow:
    0 25px 70px rgba(0,0,0,0.12),
    0 8px 20px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin:0 0 18px;
  color:#4338ca;
  font-size:24px;
  font-weight:900;
  letter-spacing:.4px;
  font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
}

.title-main{ color:#1e3a8a; }

.toolbar{
  background:white;
  border-radius:14px;
  padding:14px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.toolbar input,.toolbar select{
  padding:8px 14px;
  border-radius:12px;
  border:1px solid #dbe3f0;
  font-family:inherit;
  font-size:13px;
  background: linear-gradient(180deg, #ffffff, #f4f7ff);
  outline:none;
  transition: all .15s ease;
  box-shadow:
    0 8px 18px rgba(15,23,42,0.10),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.toolbar input:hover,.toolbar select:hover{
  box-shadow:
    0 10px 22px rgba(15,23,42,0.14),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.toolbar input:focus,.toolbar select:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

.btn{
  padding:9px 18px;
  border-radius:12px;
  border:1px solid #c7d2fe;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
  cursor:pointer;
  font-weight:800;
  font-size:13px;
  color:#3730a3;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition: all .15s ease;
}

.btn:hover{ transform: translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,0.15); }

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

.btn-danger{
  border-color: rgba(239,68,68,0.3);
  background: linear-gradient(180deg,#fff,#fee2e2);
  color:#991b1b;
}

.board-wrap{
  background:white;
  border-radius:16px;
  overflow:auto;
  padding:8px;
  box-shadow:
    0 20px 40px rgba(0,0,0,0.12),
    0 4px 10px rgba(0,0,0,0.06);
}

.board{
  display:grid;
  grid-template-columns:90px repeat(6, 120px);
  min-width:860px;
}

.head-cell{
  position: sticky;
  top: 0;
  z-index: 3;
  background:linear-gradient(180deg,#e0e7ff,#c7d2fe);
  border-bottom:1px solid var(--border);
  border-left:1px solid var(--border);
  text-align:center;
  font-weight:900;
  font-size:17px;
  padding:10px 6px;
  color:#3730a3;
}

.time-cell{
  position: sticky;
  right: 0;
  z-index: 2;
  background:#f1f5ff;
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  text-align:center;
  font-weight:900;
  font-size:12px;
  padding:7px;
}

.slot{
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  min-height:70px;
  padding:6px;
  position:relative;
  transition: all .15s ease;
  background:white;
}

.slot:nth-child(odd){ background:#fbfdff; }

.slot:hover{
  background:#eef2ff;
  box-shadow: inset 0 0 0 1px #c7d2fe;
}

.event-card{
  position:relative;
  z-index:2;
  border-radius:10px;
  padding:7px;
  font-size:11px;
  color:#1e293b;
  margin-bottom:5px;
  cursor:pointer;
  font-weight:800;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 6px 14px rgba(0,0,0,0.25);
  transition: all .15s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.event-card:hover{ transform: scale(1.06); }

.add-btn{
  position:absolute;
  top:4px;
  left:6px;
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid rgba(255,255,255,0.95);
  border-radius:50%;
  background:rgba(255,255,255,0.18);
  backdrop-filter: blur(2px);
  font-weight:900;
  font-size:18px;
  cursor:pointer;
  opacity:0;
  transform:scale(0.65);
  z-index:6;
  transition: opacity .18s ease, transform .18s ease;
}

.slot:hover .add-btn{ opacity:1; transform:scale(1); }

.modal-backdrop{
  position:fixed;
  inset:0;
  background: rgba(15,23,42,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding: 14px;
}

.modal{
  width:min(320px,90vw);
  background:white;
  border-radius:16px;
  box-shadow:0 25px 60px rgba(0,0,0,0.30);
  overflow:hidden;
}

.modal-header{
  padding:10px 14px;
  background:linear-gradient(180deg,#e0e7ff,#c7d2fe);
  font-weight:900;
  font-size:14px;
  color:#3730a3;
  text-align:center;
}

.modal-body{ padding:12px 14px; display:grid; gap:8px; }

.modal-actions{
  padding:14px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:center;
  gap:12px;
  background:#fafbff;
}

.pill{
  display:inline-flex;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  color:white;
}

.pill.zoom1{ background:#3b82f6; }
.pill.zoom2{ background:#16a34a; }
.pill.zoom3{ background:#9333ea; }

.small-note{ font-size:12px; color:var(--muted); }

.link-popup-body{ padding:16px 14px; display:grid; gap:10px; text-align:center; }

.zoom-link-box{
  border:1px solid #dbe3f0;
  border-radius:10px;
  background:#f8fafc;
  padding:8px;
  font-size:12px;
  line-height:1.5;
  color:#334155;
  word-break:break-all;
}

.btn-compact{
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  min-width:110px;
  margin:0 auto;
}
</style>
</head>
<body>

<div class="container">
  <h1><span class="title-main">ממשק לניהול חשבונות</span> ZOOM - <span class="title-main">תעשיידע</span></h1>

  <div class="toolbar">
    <input id="searchInstructor" placeholder="חיפוש..." />

    <select id="filterZoom">
      <option value="">ZOOM</option>
      <option value="Zoom1">Zoom1</option>
      <option value="Zoom2">Zoom2</option>
      <option value="Zoom3">Zoom3</option>
    </select>
    <button id="clearBtn" class="btn btn-danger" type="button">RESET</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<div id="assignModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header" id="modalTitle">שיבוץ מדריך</div>

    <div class="modal-body">
      <div style="font-weight:800;font-size:14px;text-align:center">
        <span id="modalDay"></span> · <span id="modalTime"></span>
      </div>

      <div style="font-size:12px;color:#64748b;font-weight:800;margin-top:6px">מדריך:</div>
      <select id="modalInstructor"></select>

      <div style="font-size:12px;color:#64748b;font-weight:800;margin-top:6px">בית ספר:</div>
      <select id="modalSchool"></select>

      <div style="font-size:12px;color:#64748b;font-weight:800;margin-top:6px">שם קורס:</div>
      <select id="modalCourse"></select>

      <div id="schoolCourseHint" style="text-align:center;color:#64748b;font-weight:800;font-size:12px"></div>
<div style="text-align:center">
        <div style="font-size:12px;color:#64748b">Zoom שיוקצה:</div>
        <div class="pill" id="zoomSuggestion"></div>
      </div>

      <div id="modalStatus" style="text-align:center;color:#b91c1c;font-weight:800"></div>
    </div>

    <div class="modal-actions">
      <button id="cancelBtn" class="btn" type="button">ביטול</button>
      <button id="saveBtn" class="btn" type="button">שמור</button>
    </div>
  </div>
</div>

<div id="zoomLinkModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">קישור זום לשיעור</div>
    <div class="link-popup-body">
      <div id="zoomLinkUser" style="font-weight:900;color:#3730a3"></div>
      <div id="zoomLinkValue" class="zoom-link-box"></div>
      <button id="copyZoomLinkBtn" class="btn btn-compact" type="button">העתק קישור</button>
      <div id="copyStatus" class="small-note"></div>
    </div>
  </div>
</div>

<script>
/*
  תיקונים מרכזיים בגרסה הזו:
  1) כפתור "שמור" לא נתקע בשקט: כל שגיאת API מוצגת למשתמש ולא "בולעת" לחיצה.
  2) ערכי <option> של מדריכים אינם HTML-escaped (כדי לא לשבור שמות עם גרשיים). משתמשים ב-encodeURIComponent.
  3) מחיקה/איפוס: ניסיון למחיקה גם ב-GAS דרך action=delete/clear. אם אין תמיכה – ממשיך מקומית.
  4) TIME_SLOTS מסודר לפי זמן התחלה כדי שה"משבצת הקודמת" תהיה הגיונית.
*/

// ימים בעברית
const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי"];

// שעות (מקור)
const TIME_SLOTS_RAW = [
  "08:00-09:00",
  "09:00-10:00",
  "10:00-11:00",
  "11:00-12:00",
  "12:00-13:00",
  "13:00-14:00",
  "14:00-15:00",
  "08:00-10:00",
  "10:00-12:00",
  "12:00-14:00",
  "14:00-16:00"
];

const ZOOMS = ["Zoom1","Zoom2","Zoom3"];
const ZOOM_LINKS = {
  Zoom1: "https://zoom.us/j/6023602336?omn=96962875568",
  Zoom2: "https://zoom.us/j/7601360450?omn=98989531483",
  Zoom3: "https://zoom.us/j/97448258082"
};

// מדריכים
const instructors = [
  "הנאא אבו אמזה","הילה רוזן","ראנה סאלח","סוהא סאלם","מיכל שכטמן","אלדר מיכאל טייב",
  "אביגדור שרון","אסיל ג'בר","אביב בלנדר","ברקת קטעי","ליאל בן חמו","אלכס זפקה",
  "אפרת אוחיון","עליזה מולה","כרמית סמנדרוב","קרן גורביץ","אוריה פדידה","אילנה טיטייבסקי",
  "אושרי רם","אמיר מלמוד","אסאלה ברהום"
].sort((a,b)=>a.localeCompare(b,'he'));

// צבע קבוע לכל מדריך
const instructorColors = {};
const colorPalette = [
  "#b2ebf2", "#f8bbd0", "#fff9c4", "#ffe0b2", "#c8e6c9", "#bbdefb",
  "#e0f7fa", "#fce4ec", "#fff3e0", "#f3e5f5", "#e3f2fd", "#ffebee"
];
instructors.forEach((name,i)=>{ instructorColors[name] = colorPalette[i % colorPalette.length]; });

// --- Persist config ---
const API_URL = "https://script.google.com/macros/s/AKfycbzP4qa72BKpvW6ahaWL2XOdzoR5TSiaViwIV4wULCSckyiLza6zLHYltzV3c90Fm_bv/exec";
const STORAGE_KEY = "zoomScheduleLocal"; // fallback localStorage

let schedule = [];

// --- DOM ---
const boardEl = document.getElementById('board');
const searchEl = document.getElementById('searchInstructor');
const zoomFilterEl = document.getElementById('filterZoom');
const clearBtn = document.getElementById('clearBtn');

const modalBackdrop = document.getElementById('assignModal');
const modalDayEl = document.getElementById('modalDay');
const modalTimeEl = document.getElementById('modalTime');
const modalInstructorEl = document.getElementById('modalInstructor');
const modalSchoolEl = document.getElementById('modalSchool');
const modalCourseEl = document.getElementById('modalCourse');
const schoolCourseHintEl = document.getElementById('schoolCourseHint');
const modalStatusEl = document.getElementById('modalStatus');
const zoomSuggestionEl = document.getElementById('zoomSuggestion');
const cancelBtn = document.getElementById('cancelBtn');
const saveBtn = document.getElementById('saveBtn');

const zoomLinkModal = document.getElementById('zoomLinkModal');
const zoomLinkUserEl = document.getElementById('zoomLinkUser');
const zoomLinkValueEl = document.getElementById('zoomLinkValue');
const copyZoomLinkBtn = document.getElementById('copyZoomLinkBtn');
const copyStatusEl = document.getElementById('copyStatus');

const modalState = { day: null, time: null };

// --- Utilities ---
function persistSchedule(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule)); }catch(_){ /* ignore */ }
}

function toMinutes(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60 + m;
}

function parseSlot(slot){
  const [start, end] = slot.split('-');
  return { start: toMinutes(start), end: toMinutes(end) };
}

function slotsOverlap(a, b){
  const s1 = parseSlot(a);
  const s2 = parseSlot(b);
  return s1.start < s2.end && s2.start < s1.end;
}

function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function enc(s){ return encodeURIComponent(String(s)); }
function dec(s){ return decodeURIComponent(String(s || '')); }

// TIME_SLOTS מסודר לפי זמן התחלה/סיום כדי שה"קודם" יהיה הגיוני
const TIME_SLOTS = [...new Set(TIME_SLOTS_RAW)].sort((a,b)=>{
  const pa = parseSlot(a);
  const pb = parseSlot(b);
  return (pa.start - pb.start) || (pa.end - pb.end);
});

function getSearchTerm(){
  const term = (searchEl.value || '').trim().toLowerCase();
  return term.length >= 3 ? term : '';
}

function eventMatchesFilters(ev){
  const term = getSearchTerm();
  const zoom = zoomFilterEl.value;

  if(term){
    const t = (ev.instructor || '').toLowerCase();
    if(!t.includes(term)) return false;
  }

  if(zoom && ev.zoom !== zoom) return false;
  return true;
}

function getEventsInCell(day, time){
  return schedule.filter(e => e.day === day && e.time === time);
}

function isZoomFree(day, time, zoom){
  return !schedule.some(e => e.day === day && e.zoom === zoom && slotsOverlap(e.time, time));
}

function isInstructorFree(day, time, instructor){
  return !schedule.some(e => e.day === day && e.instructor === instructor && slotsOverlap(e.time, time));
}

function normalizeEvent(e){
  if(!e || typeof e !== 'object') return null;
  const day = String(e.day || '');
  const time = String(e.time || '');
  const instructor = String(e.instructor || '');
  const zoom = String(e.zoom || '');
  const zoomLink = String(e.zoomLink || ZOOM_LINKS[zoom] || '');
  const school = String(e.school || '');
  const course = String(e.course || '');
  const id = (e.id === 0 || e.id) ? e.id : null;
  return { id, day, time, instructor, zoom, zoomLink, school, course };
}

function pickZoomForSlot(day, time, instructor=null){
  // מקסימום 3 באותה משבצת זמן זהה
  const usedNowExact = getEventsInCell(day, time).map(e => e.zoom);
  const availableExact = ZOOMS.filter(z => !usedNowExact.includes(z));
  if(availableExact.length === 0) return null;

  // וגם פנוי מבחינת חפיפה
  const available = availableExact.filter(z => isZoomFree(day, time, z));
  if(available.length === 0) return null;

  const idx = TIME_SLOTS.indexOf(time);

  // עדיפות 1: אם אותו מדריך לימד במשבצת הקודמת, תן לו את אותו Zoom (אם פנוי)
  if(instructor && idx > 0){
    const prevTime = TIME_SLOTS[idx - 1];
    const prev = schedule.find(e => e.day===day && e.time===prevTime && e.instructor===instructor);
    if(prev && available.includes(prev.zoom)) return prev.zoom;
  }

  // עדיפות 2: Zoom שלא היה במשבצת הזמן הקודמת
  let usedPrev = [];
  if(idx > 0){
    const prevTime = TIME_SLOTS[idx - 1];
    usedPrev = getEventsInCell(day, prevTime).map(e => e.zoom);
  }

  const preferred = available.find(z => !usedPrev.includes(z));
  return preferred || available[0];
}

function setBusy(isBusy, msg=''){
  saveBtn.disabled = !!isBusy;
  cancelBtn.disabled = !!isBusy;
  modalInstructorEl.disabled = !!isBusy;
  modalStatusEl.textContent = msg || '';
}

function fillInstructorsSelect(){
  // חשוב: value הוא encodeURIComponent(name) כדי לא לשבור שמות עם גרשיים/תווים מיוחדים.
  modalInstructorEl.innerHTML = "<option value=''>בחר מדריך</option>" +
    instructors.map(name => {
      const v = enc(name);
      return `<option value="${v}">${escHtml(name)}</option>`;
    }).join('');
}

fillInstructorsSelect();

// ====== בתי ספר וקורסים (הרשימה הקבועה שלך) ======
// מקור אמת: הרשימה שהדבקת בצ׳אט. לא נשלף משום מקום אחר.
// המבנה: INSTRUCTOR_MAP[instructor] = [{school, course}, ...]
const INSTRUCTOR_MAP = {};
const RAW_ASSIGNMENTS = [
  ["אביב בלנדר","מתנ\"ס","תלמידים להייטק"],
  ["אביב בלנדר","תל-חי","ביומימיקרי"],
  ["אביב בלנדר","מצודות","ביומימיקרי"],
  ["אוריה פדידה","טשרניחובסקי","בינה מלאכותית"],
  ["אוריה פדידה","אורט גוטמן","תמיר - איפה דדי?"],
  ["אושרי רם","טשרניחובסקי","בינה מלאכותית"],
  ["אילנה טיטייבסקי","גולדה","ביומימיקרי"],
  ["אילנה טיטייבסקי","ישיבת אבירי יעקב","השמיים אינם הגבול"],
  ["אלדר מיכאל טייב","בי\"ס אילנות","ביומימיקרי"],
  ["אלדר מיכאל טייב","בראשית","ביומימיקרי"],
  ["אלדר מיכאל טייב","התומר","בינה מלאכותית"],
  ["אלדר מיכאל טייב","מקיף אמית","פרימיום"],
  ["אלדר מיכאל טייב","שקמים","בינה מלאכותית"],
  ["אלדר מיכאל טייב","אבן שמואל","ביומימיקרי"],
  ["אלדר מיכאל טייב","בי\"ס שפיר","בינה מלאכותית"],
  ["אלדר מיכאל טייב","אסם","הרמת כוסית - אסם (פרימיום)"],
  ["אלכס זפקה","ניצני קטיף","ביומימיקרי"],
  ["אלכס זפקה","מקיף ה'","רוקחים עולם"],
  ["אלכס זפקה","מקיף ה'","בינה מלאכותית"],
  ["אלכס זפקה","שמש גבולות","בינה מלאכותית"],
  ["אלכס זפקה","פרדס צפוני","ביומימיקרי"],
  ["אלכס זפקה","בינת תקשורת","סיור"],
  ["אמיר מלמוד","מקיף ג'","רוקחים עולם"],
  ["אסאלה ברהום","יסודי עין נקובא-ראפה","מנהיגות ירוקה"],
  ["אסיל ג'בר","נווה שלום","מנהיגות ירוקה"],
  ["אפרת אוחיון","שדות סילבר","בינה מלאכותית"],
  ["אפרת אוחיון","ביכורים","ביומימיקרי"],
  ["אפרת אוחיון","קסם","מנהיגות ירוקה"],
  ["אפרת אוחיון","הרטוב","מנהיגות ירוקה"],

RAW_ASSIGNMENTS.forEach(([inst, school, course])=>{
  if(!INSTRUCTOR_MAP[inst]) INSTRUCTOR_MAP[inst] = [];
  if(!INSTRUCTOR_MAP[inst].some(x=>x.school===school && x.course===course)){
    INSTRUCTOR_MAP[inst].push({ school, course });
  }
});

function getSchoolsForInstructor(instructor){
  const rows = INSTRUCTOR_MAP[instructor] || [];
  const set = new Set(rows.map(r=>r.school).filter(Boolean));
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'he'));
}

function getCoursesForInstructorAndSchool(instructor, school){
  const rows = INSTRUCTOR_MAP[instructor] || [];
  const set = new Set(rows.filter(r=>r.school===school).map(r=>r.course).filter(Boolean));
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'he'));
}

function fillSchoolsSelectForInstructor(instructor){
  const schools = getSchoolsForInstructor(instructor);
  modalSchoolEl.innerHTML = "<option value=''>בחר בית ספר</option>" +
    schools.map(s => `<option value=\"${enc(s)}\">${escHtml(s)}</option>`).join('');
}

function fillCoursesSelectForInstructor(instructor, school){
  const courses = school ? getCoursesForInstructorAndSchool(instructor, school) : [];
  modalCourseEl.innerHTML = "<option value=''>בחר קורס</option>" +
    courses.map(c => `<option value=\"${enc(c)}\">${escHtml(c)}</option>`).join('');
}

function findSuggestedSchoolCourseForInstructor(instructor){
  const idxOf = (t)=> TIME_SLOTS.indexOf(t);
  const same = schedule.filter(e => e && e.instructor === instructor && (e.school || e.course));
  if(same.length){
    same.sort((a,b)=>{
      const da = DAYS.indexOf(a.day);
      const db = DAYS.indexOf(b.day);
      const ta = idxOf(a.time);
      const tb = idxOf(b.time);
      return (da - db) || (ta - tb);
    });
    const last = same[same.length - 1];
    return { school: last.school || '', course: last.course || '' };
  }
  const list = INSTRUCTOR_MAP[instructor] || [];
  if(list.length) return { school: list[0].school || '', course: list[0].course || '' };
  return { school:'', course:'' };
}

function applySuggestedSchoolCourse(instructor){
  if(!instructor){
    modalSchoolEl.innerHTML = "<option value=''>בחר קודם מדריך</option>";
    modalCourseEl.innerHTML = "<option value=''>בחר קודם מדריך</option>";
    schoolCourseHintEl.textContent = '';
    return;
  }

  fillSchoolsSelectForInstructor(instructor);

  const sug = findSuggestedSchoolCourseForInstructor(instructor);
  if(sug.school){
    modalSchoolEl.value = enc(sug.school);
    fillCoursesSelectForInstructor(instructor, sug.school);

    if(sug.course){
      modalCourseEl.value = enc(sug.course);
      schoolCourseHintEl.textContent = `הצעה: ${sug.school} · ${sug.course}`;
    }else{
      schoolCourseHintEl.textContent = `הצעה: ${sug.school}`;
    }
  }else{
    schoolCourseHintEl.textContent = '';
    modalCourseEl.innerHTML = "<option value=''>בחר קורס</option>";
  }
}

modalSchoolEl.addEventListener('change', ()=>{
  const instructor = modalInstructorEl.value ? dec(modalInstructorEl.value) : '';
  const school = modalSchoolEl.value ? dec(modalSchoolEl.value) : '';
  fillCoursesSelectForInstructor(instructor, school);
  schoolCourseHintEl.textContent = '';
});

// --- Google Sheets / local fallback persistence ---
async function loadSchedule(){
  try{
    const res = await fetch(API_URL, { method: "GET", redirect: "follow" });
    if(!res.ok) throw new Error(`GET failed (${res.status})`);
    const data = await res.json();
    schedule = Array.isArray(data) ? data.map(normalizeEvent) : [];
  }catch(_){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      const data = raw ? JSON.parse(raw) : [];
      schedule = Array.isArray(data) ? data.map(normalizeEvent) : [];
    }catch(__){
      schedule = [];
    }
  }
}

async function postToApi(payload){
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
    redirect: "follow"
  });

  // ב-GAS לפעמים יש redirect/תשובה לא JSON. ננסה לקרוא טקסט לצורך דיבוג.
  const txt = await res.text().catch(()=>"");
  if(!res.ok){
    throw new Error(`API POST failed (${res.status}). ${txt}`);
  }

  // אם השרת מחזיר JSON של schedule מעודכן — נקבל אותו.
  try{
    const maybe = JSON.parse(txt);
    return maybe;
  }catch(_){
    return null;
  }
}

async function addItem(day, time, instructor, zoom, school='', course=''){
  // הקישור הוא נגזרת של חשבון ה-Zoom (אבל אם רוצים עמודה בשיט – שולחים גם אותו)
  const zoomLink = ZOOM_LINKS[zoom] || '';

  // קודם מעדכנים מקומית כדי שהכפתור תמיד "יעבוד".
  schedule.push({ id: null, day, time, instructor, zoom, zoomLink, school, course });
  persistSchedule();

  // ואז מנסים לשמור לשרת.
  try{
    const maybe = await postToApi({ action: "add", day, time, instructor, zoom, zoomLink, school, course });
    if(Array.isArray(maybe)){
      schedule = maybe.map(normalizeEvent);
      persistSchedule();
    }
  }catch(e){
    console.log("API add error", e);
    // משאירים את הנתון מקומית, ומציגים הודעה עדינה למשתמש.
    // לא עוצרים את העבודה.
  }
}

async function deleteItemByEvent(ev){
  // מחיקה מקומית מיידית
  schedule = schedule.filter(e => !(
    e.day===ev.day && e.time===ev.time && e.instructor===ev.instructor && e.zoom===ev.zoom
  ));
  persistSchedule();
  render();

  // ניסיון מחיקה בשרת (אם ה-GAS תומך)
  try{
    const maybe = await postToApi({ action: "delete", day: ev.day, time: ev.time, instructor: ev.instructor, zoom: ev.zoom });
    if(Array.isArray(maybe)){
      schedule = maybe;
      persistSchedule();
      render();
    }
  }catch(e){
    console.log("API delete error", e);
  }
}

async function clearAllRemoteIfPossible(){
  try{
    const maybe = await postToApi({ action: "clear" });
    if(Array.isArray(maybe)){
      schedule = maybe;
      persistSchedule();
      render();
    }
  }catch(e){
    console.log("API clear error", e);
  }
}

// --- Modal ---
function openModal(day, time){
  modalState.day = day;
  modalState.time = time;

  modalDayEl.textContent = day;
  modalTimeEl.textContent = time;
  modalStatusEl.textContent = '';

  // איפוס בחירה
  modalInstructorEl.value = '';

  // בית ספר/קורס - ברירת מחדל לפי הרשימה/היסטוריה
  applySuggestedSchoolCourse('');

  // הצעת Zoom ראשונית (ללא מדריך)
  updateZoomSuggestion();

  modalBackdrop.style.display = 'flex';
}

function closeModal(){
  if(saveBtn.disabled) return; // בזמן שמירה לא מאפשרים לסגור בטעות
  modalBackdrop.style.display = 'none';
  modalState.day = null;
  modalState.time = null;
  modalStatusEl.textContent = '';
}

function openZoomLinkPopup(zoom, zoomLinkOverride=''){
  const zoomLink = zoomLinkOverride || ZOOM_LINKS[zoom];
  if(!zoomLink) return;

  zoomLinkUserEl.textContent = zoom;
  zoomLinkValueEl.textContent = zoomLink;
  copyStatusEl.textContent = '';
  zoomLinkModal.style.display = 'flex';
}

function closeZoomLinkPopup(){
  zoomLinkModal.style.display = 'none';
}

async function copyZoomLink(){
  const link = zoomLinkValueEl.textContent;
  if(!link) return;

  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(link);
    }else{
      const area = document.createElement('textarea');
      area.value = link;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      document.body.removeChild(area);
    }
    copyStatusEl.textContent = 'הקישור הועתק.';
    setTimeout(closeZoomLinkPopup, 350);
  }catch(_){
    copyStatusEl.textContent = 'לא ניתן להעתיק. נסו שוב.';
  }
}

function updateZoomSuggestion(){
  const day = modalState.day;
  const time = modalState.time;
  const instructor = modalInstructorEl.value ? dec(modalInstructorEl.value) : null;

  const suggested = pickZoomForSlot(day, time, instructor);
  zoomSuggestionEl.className = 'pill';

  if(suggested){
    zoomSuggestionEl.textContent = suggested;
    zoomSuggestionEl.classList.add(suggested.toLowerCase());
  }else{
    zoomSuggestionEl.textContent = 'אין פנוי';
  }
}

async function saveAssignment(){
  const day = modalState.day;
  const time = modalState.time;

  if(!day || !time){
    modalStatusEl.textContent = 'שגיאה: חסר יום/שעה.';
    return;
  }

  const instructor = modalInstructorEl.value ? dec(modalInstructorEl.value) : '';
  if(!instructor){
    modalStatusEl.textContent = 'יש לבחור מדריך.';
    return;
  }

  if(!isInstructorFree(day, time, instructor)){
    modalStatusEl.textContent = 'המדריך כבר משובץ בזמן חופף.';
    return;
  }

  const zoom = pickZoomForSlot(day, time, instructor);
  if(!zoom){
    modalStatusEl.textContent = 'אין חשבון Zoom פנוי בשעה זו.';
    return;
  }

  // לא לשבץ אותו Zoom באותה משבצת (זהה)
  if(getEventsInCell(day, time).some(e => e.zoom === zoom)){
    modalStatusEl.textContent = 'חשבון Zoom זה כבר משובץ במשבצת זו.';
    return;
  }

  setBusy(true, 'שומר...');
  try{
    const school = modalSchoolEl.value ? dec(modalSchoolEl.value) : '';
    const course = modalCourseEl.value ? dec(modalCourseEl.value) : '';

    await addItem(day, time, instructor, zoom, school, course);
    // הצלחה מקומית לפחות
    modalStatusEl.textContent = '';
    modalBackdrop.style.display = 'none';
    render();
    openZoomLinkPopup(zoom, ZOOM_LINKS[zoom] || '');
  }catch(e){
    console.log(e);
    modalStatusEl.textContent = 'שגיאה בשמירה. נסו שוב.';
  }finally{
    setBusy(false);
  }
}

// --- Render ---
function render(){
  boardEl.innerHTML = '';

  boardEl.insertAdjacentHTML('beforeend', `<div class="head-cell">שעה</div>`);
  DAYS.forEach(d => boardEl.insertAdjacentHTML('beforeend', `<div class="head-cell">${escHtml(d)}</div>`));

  TIME_SLOTS.forEach(time => {
    boardEl.insertAdjacentHTML('beforeend', `<div class="time-cell">${escHtml(time)}</div>`);

    DAYS.forEach(day => {
      const cellEvents = getEventsInCell(day, time);
      const visible = cellEvents.filter(eventMatchesFilters);

      const cardsHtml = visible.map(ev => {
        const bg = instructorColors[ev.instructor] || '#e5e7eb';
        return `<div class="event-card"
          data-id="${ev.id ? String(ev.id) : ''}"
          data-day="${enc(day)}"
          data-time="${enc(time)}"
          data-instructor="${enc(ev.instructor)}"
          data-zoom="${enc(ev.zoom)}"
          data-zoomlink="${enc(ev.zoomLink || ZOOM_LINKS[ev.zoom] || '')}"
          data-school="${enc(ev.school || '')}"
          data-course="${enc(ev.course || '')}"
          title="לחץ להסרה"
          style="background:${bg}">
          ${escHtml(ev.instructor)} | ${escHtml(ev.zoom)}
        </div>`;
      }).join('');

      // חשוב: data-* הם raw (לא escHtml) כדי לא לייצר ערכים מוזרים
      boardEl.insertAdjacentHTML('beforeend',
        `<div class="slot" data-day="${enc(day)}" data-time="${enc(time)}">
          ${cardsHtml}
          <button class="add-btn" type="button" title="שיבוץ">+</button>
        </div>`
      );
    });
  });

  attachInteractions();
}

function attachInteractions(){
  // הפלוס פותח חלונית
  document.querySelectorAll('.add-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const slot = btn.closest('.slot');
      openModal(dec(slot.dataset.day), dec(slot.dataset.time));
    };
  });

  // לחיצה על שיבוץ קיים = הסרה
  document.querySelectorAll('.event-card').forEach(card => {
    card.onclick = async (e) => {
      // Shift+Click מציג קישור בלבד (ללא מחיקה)
      if(e.shiftKey){
        const z = dec(card.dataset.zoom);
        const l = card.dataset.zoomlink ? dec(card.dataset.zoomlink) : (ZOOM_LINKS[z] || '');
        openZoomLinkPopup(z, l);
        return;
      }
      e.stopPropagation();

      const ev = {
        id: card.dataset.id ? Number(card.dataset.id) : null,
        day: dec(card.dataset.day),
        time: dec(card.dataset.time),
        instructor: dec(card.dataset.instructor),
        zoom: dec(card.dataset.zoom),
        zoomLink: card.dataset.zoomlink ? dec(card.dataset.zoomlink) : (ZOOM_LINKS[dec(card.dataset.zoom)] || ''),
        school: card.dataset.school ? dec(card.dataset.school) : '',
        course: card.dataset.course ? dec(card.dataset.course) : ''
      };

      const ok = confirm(`להסיר את השיבוץ של ${ev.instructor}?`);
      if(!ok) return;

      await deleteItemByEvent(ev);

      // אופציונלי: בלחיצה על כרטיס עם Shift – מציגים את הקישור בלי למחוק
      // (לא משנה שום לוגיקה קיימת למחיקה רגילה)
      // אם תרצה להפוך את זה לברירת מחדל – אגיד לך איפה לשנות.
      
    };
  });
}

// --- Controls ---
async function clearSystem(){
  if(!confirm('למחוק את כל השיבוצים במערכת?')) return;
  schedule = [];
  persistSchedule();
  searchEl.value = '';
  zoomFilterEl.value = '';
  render();

  // ניסיון למחיקה בשרת (אם קיים)
  await clearAllRemoteIfPossible();
}

// --- Events / bindings ---
searchEl.addEventListener('input', render);
zoomFilterEl.addEventListener('change', render);
clearBtn.addEventListener('click', clearSystem);

cancelBtn.addEventListener('click', closeModal);
saveBtn.addEventListener('click', saveAssignment);
copyZoomLinkBtn.addEventListener('click', copyZoomLink);

modalBackdrop.addEventListener('click', (e)=>{ if(e.target === modalBackdrop) closeModal(); });
zoomLinkModal.addEventListener('click', (e)=>{ if(e.target === zoomLinkModal) closeZoomLinkPopup(); });
window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape' && modalBackdrop.style.display === 'flex') closeModal(); });
window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape' && zoomLinkModal.style.display === 'flex') closeZoomLinkPopup(); });

modalInstructorEl.addEventListener('change', ()=>{
  updateZoomSuggestion();
  const instructor = modalInstructorEl.value ? dec(modalInstructorEl.value) : '';
  applySuggestedSchoolCourse(instructor);
});

// --- Init ---
(async function init(){
  await loadSchedule();
  render();
})();
