<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מערכת ניהול Zoom - תעשיידע</title>
<style>
:root{
  --bg1:#eef2ff;
  --bg2:#f8fafc;
  --panel:#ffffff;
  --border:#e2e8f0;
  --text:#1e293b;
  --muted:#64748b;
  --accent:#6366f1;
  --danger:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Heebo, Segoe UI, sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 20% 20%, #c7d2fe 0%, transparent 40%),
    radial-gradient(circle at 80% 10%, #bae6fd 0%, transparent 40%),
    linear-gradient(180deg,#eef2ff,#f8fafc);
}

.layout{
  width:100%;
  max-width:1280px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
}

.container{
  direction:rtl;
  width:100%;
  max-width:1100px;
  padding:30px;
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius:22px;
  box-shadow:
    0 25px 70px rgba(0,0,0,0.12),
    0 8px 20px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin:0 0 18px;
  color:#4338ca;
  font-size:24px;
  font-weight:900;
  letter-spacing:.4px;
  font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
}

.title-main{ color:#1e3a8a; }

.toolbar{
  background:white;
  border-radius:14px;
  padding:14px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.toolbar input,.toolbar select{
  padding:8px 14px;
  border-radius:12px;
  border:1px solid #dbe3f0;
  font-family:inherit;
  font-size:13px;
  background: linear-gradient(180deg, #ffffff, #f4f7ff);
  outline:none;
  transition: all .15s ease;
  box-shadow:
    0 8px 18px rgba(15,23,42,0.10),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.toolbar input:hover,.toolbar select:hover{
  box-shadow:
    0 10px 22px rgba(15,23,42,0.14),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.toolbar input:focus,.toolbar select:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

.btn{
  padding:9px 18px;
  border-radius:12px;
  border:1px solid #c7d2fe;
  background:linear-gradient(180deg,#ffffff,#eef2ff);
  cursor:pointer;
  font-weight:800;
  font-size:13px;
  color:#3730a3;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition: all .15s ease;
}

.btn:hover{
  transform: translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.btn:active{
  transform: translateY(1px);
  box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

.btn-danger{
  border-color: rgba(239,68,68,0.3);
  background: linear-gradient(180deg,#fff,#fee2e2);
  color:#991b1b;
}

.board-wrap{
  background:white;
  border-radius:16px;
  overflow:auto;
  padding:8px;
  box-shadow:
    0 20px 40px rgba(0,0,0,0.12),
    0 4px 10px rgba(0,0,0,0.06);
}

.board{
  display:grid;
  grid-template-columns:90px repeat(4, 120px);
  min-width:860px;
}

.head-cell{
  position: sticky;
  top: 0;
  z-index: 3;
  background:linear-gradient(180deg,#e0e7ff,#c7d2fe);
  border-bottom:1px solid var(--border);
  border-left:1px solid var(--border);
  text-align:center;
  font-weight:900;
  font-size:17px;
  padding:10px 6px;
  color:#3730a3;
}

.time-cell{
  position: sticky;
  right: 0;
  z-index: 2;
  background:#f1f5ff;
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  text-align:center;
  font-weight:900;
  font-size:12px;
  padding:7px;
}

.slot{
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  min-height:70px;
  padding:6px;
  position:relative;
  transition: all .15s ease;
  background:white;
}

.slot:nth-child(odd){ background:#fbfdff; }

.slot:hover{
  background:#eef2ff;
  box-shadow: inset 0 0 0 1px #c7d2fe;
}

.event-card{
  position:relative;
  z-index:2;
  border-radius:10px;
  padding:7px;
  font-size:11px;
  color:#1e293b;
  margin-bottom:5px;
  cursor:pointer;
  font-weight:800;
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 6px 14px rgba(0,0,0,0.25);
  transition: all .15s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.event-card:hover{ transform: scale(1.06); }

.add-btn{
  position:absolute;
  top:4px;
  left:6px;
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid rgba(255,255,255,0.95);
  border-radius:50%;
  background:rgba(255,255,255,0.18);
  backdrop-filter: blur(2px);
  font-weight:900;
  font-size:18px;
  cursor:pointer;
  opacity:0;
  transform:scale(0.65);
  z-index:6;
  transition: opacity .18s ease, transform .18s ease;
}

.slot:hover .add-btn{ opacity:1; transform:scale(1); }

.modal-backdrop{
  position:fixed;
  inset:0;
  background: rgba(15,23,42,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding: 14px;
}

.modal{
  width:min(320px,90vw);
  background:white;
  border-radius:16px;
  box-shadow:0 25px 60px rgba(0,0,0,0.30);
  overflow:hidden;
}

.modal-header{
  padding:10px 14px;
  background:linear-gradient(180deg,#e0e7ff,#c7d2fe);
  font-weight:900;
  font-size:14px;
  color:#3730a3;
  text-align:center;
}

.modal-body{ padding:12px 14px; display:grid; gap:10px; }

/* הגדלת גובה תיבות הרשימה (בחירת מדריך וכו') */
.modal-body select{
  height:44px;
  font-size:14px;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid #dbe3f0;
  background:#ffffff;
}

.modal-actions{
  padding:14px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:center;
  gap:12px;
  background:#fafbff;
}

.zoom-side{
  position:fixed;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  z-index:100;
}

.zoom-side-note{
  margin:0;
  text-align:center;
  font-size:11px;
  line-height:1.25;
  color:#475569;
  font-weight:700;
  max-width:88px;
}

.save-container{
  position:fixed;
  bottom:25px;
  left:25px;
  z-index:999;
}

.save-status{
  position:fixed;
  bottom:96px;
  left:25px;
  z-index:1000;
  min-width:190px;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
  opacity:0;
  transform:translateY(6px);
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
}

.save-status.show{
  opacity:1;
  transform:translateY(0);
}

.save-status.loading{ background:#0ea5e9; }
.save-status.success{ background:#16a34a; }
.save-status.error{ background:#dc2626; }

.save-btn{
  background:#10b981;
  color:white;
  border:none;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.25);
  transition:all 0.2s ease;
}

.save-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.3);
}

.save-btn:active{
  transform:translateY(1px);
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.zoom-btn{
  width:54px;
  height:54px;
  font-size:17px;
  font-weight:900;
  border-radius:10px;
  cursor:pointer;
  border:2px solid;
  transition:all .15s ease;
  box-shadow:
    0 7px 0 rgba(15,23,42,0.26),
    0 12px 18px rgba(0,0,0,0.22);
}

/* תחושת לחיצה */
.zoom-btn:hover{
  transform:translateY(-1px);
  box-shadow:
    0 8px 0 rgba(15,23,42,0.24),
    0 14px 20px rgba(0,0,0,0.24);
}

.zoom-btn:active{
  transform:translateY(4px);
  box-shadow:
    0 3px 0 rgba(15,23,42,0.24),
    0 5px 10px rgba(0,0,0,0.18);
}

#saveBtn.is-loading{
  transform:translateY(1px);
  box-shadow:0 3px 8px rgba(0,0,0,0.14);
  opacity:.9;
  cursor:wait;
}

/* צבעים שונים */
.zoom1{
  border-color:#10b981;
  background:#d1fae5;
}

.zoom2{
  border-color:#1d4ed8;
  background:#dbeafe;
}

.zoom3{
  border-color:#e11d48;
  background:#fde2e2;
}

.zoomQuick{
  display:flex;
  gap:4px;
  margin-right:6px;
}

.zbtn{
  background:#eef2ff;
  border:1px solid #c7d2fe;
  border-radius:6px;
  font-size:11px;
  padding:2px 6px;
  cursor:pointer;
  font-weight:600;
}

.zbtn:hover{
  background:#c7d2fe;
}

.pill{
  display:inline-flex;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  color:white;
}

.pill.zoom1{ background:#3b82f6; }
.pill.zoom2{ background:#16a34a; }
.pill.zoom3{ background:#9333ea; }

.small-note{ font-size:12px; color:var(--muted); }

.link-popup-body{ padding:16px 14px; display:grid; gap:10px; text-align:center; }

.zoom-link-box{
  border:1px solid #dbe3f0;
  border-radius:10px;
  background:#f8fafc;
  padding:8px;
  font-size:12px;
  line-height:1.5;
  color:#334155;
  word-break:break-all;
}

.btn-compact{ padding:6px 12px; border-radius:10px; font-size:12px; min-width:110px; margin:0 auto; }

/* Tooltip (hover details) */
.tooltip{
  position:fixed;
  z-index:2000;
  display:none;
  max-width:340px;
  background:#0f172a;
  color:#fff;
  padding:10px 12px;
  border-radius:12px;
  font-size:12px;
  line-height:1.4;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  pointer-events:none;
}
.tooltip .t-title{ font-weight:900; margin-bottom:6px; }
.tooltip .t-row{ display:flex; gap:8px; }
.tooltip .t-k{ opacity:.75; min-width:78px; }
.tooltip .t-v{ font-weight:700; }
.tooltip hr{ border:none; border-top:1px solid rgba(255,255,255,.18); margin:8px 0; }
.tooltip ul{ margin:6px 0 0; padding:0 18px 0 0; }
.tooltip li{ margin:2px 0; }


.view{ display:none; }
.view.active{ display:block; }

.potential-btn{
  background:#6366f1;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  cursor:pointer;
  transition:0.2s;
  font-weight:800;
}

.potential-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

.potential-title{
  margin:0 0 14px;
  font-size:20px;
  color:#312e81;
  text-align:right;
}



.potential-tab{
  border:1px solid #c7d2fe;
  background:#eef2ff;
  color:#3730a3;
  border-radius:999px;
  padding:6px 14px;
  cursor:pointer;
  font-weight:700;
}

.potential-tab.active{ background:#6366f1; color:#fff; }
.potential-controls{ display:flex; justify-content:flex-end; margin-bottom:10px; }
.potential-calendar{ display:grid; gap:12px; }
.potential-week{ background:#fff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; }
.potential-week-title{ padding:10px 12px; font-weight:900; background:#eef2ff; color:#3730a3; }
.potential-week-grid{ display:grid; grid-template-columns:repeat(5,1fr); border-top:1px solid #e2e8f0; }
.potential-day-col{ border-left:1px solid #e2e8f0; min-height:130px; }
.potential-day-col:last-child{ border-left:none; }
.potential-day-head{ padding:8px 10px; font-weight:800; background:#f8faff; }
.potential-day-body{ padding:8px; display:grid; gap:8px; }
.potential-item{ border:1px solid #e2e8f0; border-radius:10px; padding:8px; background:#fff; font-size:12px; }
.potential-item-row{ margin-bottom:4px; }
.potential-item-actions{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:6px; }
.potential-status{ font-weight:800; }
.potential-status.assigned{ color:#16a34a; }
.potential-status.ok{ color:#059669; }
.potential-status.bad{ color:#b91c1c; }
.potential-status.warn{ color:#c2410c; }
.assign-btn{ padding:5px 10px; border-radius:8px; border:1px solid #c7d2fe; background:#eef2ff; cursor:pointer; font-weight:800; }
.assign-btn:disabled{ opacity:.5; cursor:not-allowed; }

.notes-field{
  width:100%;
  border:1px solid #dbe3f0;
  border-radius:8px;
  padding:7px 10px;
  font-family:inherit;
  font-size:12px;
  min-width:220px;
}

.time-field{
  width:88px;
  max-width:100%;
  border:1px solid #dbe3f0;
  border-radius:8px;
  padding:7px 10px;
  font-family:inherit;
}

.completed-checkbox{
  width:18px;
  height:18px;
  accent-color:#16a34a;
}

.potential-muted{
  color:#64748b;
  padding:12px;
  text-align:center;
}

@media (max-width: 820px){
  .potential-title{ font-size:18px; }
  .container{ padding:18px; }
  .potential-week-grid{ grid-template-columns:1fr; }
  .potential-day-col{ border-left:none; border-top:1px solid #e2e8f0; }
}

</style>
</head>
<body>

<div class="zoom-side">
  <button class="zoom-btn zoom1" onclick="copyZoomLink(1)">Z1</button>
  <button class="zoom-btn zoom2" onclick="copyZoomLink(2)">Z2</button>
  <button class="zoom-btn zoom3" onclick="copyZoomLink(3)">Z3</button>
  <p class="zoom-side-note">לחצו על חשבון Zoom
    <br>לקבלת הקישור</p>
</div>

<div class="container">
  <h1><span class="title-main">ממשק לניהול חשבונות</span> ZOOM - <span class="title-main">תעשיידע</span></h1>

  <div class="toolbar">
    <input id="searchInstructor" placeholder="חיפוש..." />

    <select id="filterZoom">
      <option value="">ZOOM</option>
      <option value="Zoom1">Zoom1</option>
      <option value="Zoom2">Zoom2</option>
      <option value="Zoom3">Zoom3</option>
    </select>

    <select id="scheduleMonth"></select>
    <select id="scheduleYear"></select>
    <select id="scheduleWeekday">
      <option value="0">ראשון</option>
      <option value="1">שני</option>
      <option value="2">שלישי</option>
      <option value="3">רביעי</option>
      <option value="4" selected>חמישי</option>
      <option value="5">שישי</option>
    </select>

    <button id="clearBtn" class="btn btn-danger" type="button">RESET</button>
    <button id="potentialNavBtn" class="potential-btn" type="button">פוטנציאל</button>
  </div>

  <div id="scheduleView" class="view active">
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div id="potentialView" class="view">
    <h2 class="potential-title">פוטנציאל</h2>
    <div class="potential-controls">
      <button id="potentialMonthBtn" class="potential-tab active" type="button">מרץ</button>
    </div>
    <div id="potentialCalendar" class="potential-calendar"></div>
    <div id="potentialEmpty" class="potential-muted" style="display:none">אין פעילויות לחודש זה.</div>
  </div>
</div>

<div class="save-container">
  <button class="save-btn" type="button" onclick="handleManualSave()">שמור</button>
</div>

<div id="saveStatus" class="save-status" aria-live="polite"></div>

<div id="assignModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header" id="modalTitle">שיבוץ מדריך</div>

    <div class="modal-body">
      <div style="font-weight:800;font-size:14px;text-align:center">
        <span id="modalDay"></span> · <span id="modalTime"></span>
      </div>

      <select id="modalInstructor"></select>

      <select id="modalSchool"></select>

      <select id="modalCourse"></select>

      <div style="text-align:center">
        <div style="font-size:12px;color:#64748b">Zoom שיוקצה:</div>
        <div class="pill" id="zoomSuggestion"></div>
      </div>

      <div id="modalStatus" style="text-align:center;color:#b91c1c;font-weight:800"></div>
    </div>

    <div class="modal-actions">
      <button id="cancelBtn" class="btn" type="button">ביטול</button>
      <button id="saveBtn" class="btn" type="button">שמור</button>
    </div>
  </div>
</div>

<script>
/*
  תיקון לפי השרת החדש (Google Apps Script):
  - שימוש ב-action: add / delete / clear
  - שמירת zoomLink בגוגל שיט
  - מחיקה אמיתית לפי id (ולא רק מחיקה מקומית)
  - שמירה על כל הלוגיקה המקורית של חפיפות/הצעות Zoom/פילטרים
*/

// ימים בעברית
const WEEKDAY_NAMES = ["ראשון","שני","שלישי","רביעי","חמישי","שישי"];
let activeScheduleDates = [];

// סדר טווחי שעות קבוע להצגה במערכת
const TIME_SLOTS = [
  "08:00-10:00",
  "10:00-12:00",
  "12:00-14:00",
  "14:00-16:00",
  "08:00-09:00",
  "09:00-10:00",
  "10:00-11:00",
  "11:00-12:00",
  "12:00-13:00",
  "13:00-14:00",
  "14:00-15:00",
  "15:00-16:00"
];

const ZOOMS = ["Zoom1","Zoom2","Zoom3"];
const ZOOM_LINKS = {
  Zoom1: "https://zoom.us/j/6023602336?omn=96962875568",
  Zoom2: "https://zoom.us/j/7601360450?omn=98989531483",
  Zoom3: "https://zoom.us/j/5274325600?omn=96368524491"
};
const PROTECTED_HOURS = 1; // שעות מוגנות לפני שיעור קרוב

// מדריכים
const instructors = [
  "הנאא אבו אמזה","הילה רוזן","ראנה סאלח","סוהא סאלם","מיכל שכטמן","אלדר מיכאל טייב",
  "אביגדור שרון","אסיל ג'בר","אביב בלנדר","ברקת קטעי","ליאל בן חמו","אלכס זפקה",
  "אפרת אוחיון","עליזה מולה","כרמית סמנדרוב","קרן גורביץ","אוריה פדידה","אילנה טיטייבסקי"
].sort((a,b)=>a.localeCompare(b,'he'));

// שיוך מדריך -> בית ספר/מוסד + קורס (זה המידע הקבוע שנתת)
// כרגע אין שדה "רשות" נפרד בנתונים, לכן אנחנו מציגים את "בית הספר/המוסד" כפי שהוא.
const INSTRUCTOR_ASSIGNMENTS = {
  "אביב בלנדר": [
    { school: "מתנ\"ס", course: "תלמידים להייטק" },
    { school: "תל-חי", course: "ביומימיקרי" },
    { school: "מצודות", course: "ביומימיקרי" }
  ],
  "אוריה פדידה": [
    { school: "טשרניחובסקי", course: "בינה מלאכותית" },
    { school: "אורט גוטמן", course: "תמיר - איפה דדי?" }
  ],
  "אושרי רם": [
    { school: "טשרניחובסקי", course: "בינה מלאכותית" }
  ],
  "אילנה טיטייבסקי": [

function formatDateKey(dateObj){
  const dd = String(dateObj.getDate()).padStart(2,'0');
  const mm = String(dateObj.getMonth() + 1).padStart(2,'0');
  const yyyy = String(dateObj.getFullYear());
  return `${dd}/${mm}/${yyyy}`;
}

function parseDateKey(dateKey){
  const m = String(dateKey || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m) return null;
  return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
}

function generateWeeklySchedule(year, month, weekday){
  const dates = [];
  const targetWeekday = Number(weekday);
  const d = new Date(year, month - 1, 1);
  while(d.getMonth() === month - 1){
    if(d.getDay() === targetWeekday){
      dates.push(formatDateKey(d));
    }
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function getWeekdayHebName(dateKey){
  const d = parseDateKey(dateKey);
  if(!d) return '';
  const name = WEEKDAY_NAMES[d.getDay()] || '';
  return name ? `${name} ${dateKey}` : dateKey;
}

function isTimeInSchedule(time){
  return TIME_SLOTS.includes(time);
}

function roundStartTime(value){
  const [h,m] = String(value || '').split(':').map(Number);
  if(!Number.isFinite(h) || !Number.isFinite(m)) return '';
  const rounded = Math.floor((h * 60 + m) / 60) * 60;
  return `${String(Math.floor(rounded / 60)).padStart(2,'0')}:00`;
}

function roundEndTime(value){
  const [h,m] = String(value || '').split(':').map(Number);
  if(!Number.isFinite(h) || !Number.isFinite(m)) return '';
  const rounded = Math.ceil((h * 60 + m) / 60) * 60;
  return `${String(Math.floor(rounded / 60)).padStart(2,'0')}:00`;
}

function formatMonthKey(year, month){
  return `${String(month).padStart(2,'0')}/${year}`;
}

}

function positionTooltip(x, y){
  const pad = 12;
  const rect = tooltipEl.getBoundingClientRect();
  let left = x + pad;
  let top = y + pad;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  if(left + rect.width + 10 > vw) left = Math.max(10, vw - rect.width - 10);
  if(top + rect.height + 10 > vh) top = Math.max(10, vh - rect.height - 10);

  tooltipEl.style.left = left + 'px';
  tooltipEl.style.top = top + 'px';
}

function showTooltip(ev, x, y){
  tooltipEl.innerHTML = buildTooltipHtml(ev);
  tooltipEl.style.display = 'block';
  requestAnimationFrame(() => positionTooltip(x, y));
}

function hideTooltip(){
  tooltipEl.style.display = 'none';
}

// --- Utilities ---
function toMinutes(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60 + m;
}

function parseSlot(slot){
  const [start, end] = slot.split('-');
  return { start: toMinutes(start), end: toMinutes(end) };
}

function slotsOverlap(a, b){
  const s1 = parseSlot(a);
  const s2 = parseSlot(b);
  return s1.start < s2.end && s2.start < s1.end;
}

function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function enc(s){ return encodeURIComponent(String(s)); }
function dec(s){ return decodeURIComponent(String(s || '')); }

function getSearchTerm(){
  const term = (searchEl.value || '').trim().toLowerCase();
  return term.length >= 3 ? term : '';
}

function eventMatchesFilters(ev){
  const term = getSearchTerm();
  const zoom = zoomFilterEl.value;

  if(term){
    const t = (ev.instructor || '').toLowerCase();
    if(!t.includes(term)) return false;
  }

  if(zoom && ev.zoom !== zoom) return false;
  return true;
}

function getEventsInCell(day, time){
  return scheduleData.filter(e => e.day === day && e.time === time);
}

function isZoomFree(day, time, zoom){
  return !scheduleData.some(e => e.day === day && e.zoom === zoom && slotsOverlap(e.time, time));
}

function isInstructorFree(day, time, instructor){
  return !scheduleData.some(e => e.day === day && e.instructor === instructor && slotsOverlap(e.time, time));
}

function getRoundedUpCurrentTime(){
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  return Math.ceil(mins / 60) * 60;
}

function isSlotLocked(time){
  const roundedUp = getRoundedUpCurrentTime();
  const windowEnd = roundedUp + PROTECTED_HOURS * 60;
  const slotStart = toMinutes(time.split('-')[0]);
  return slotStart >= roundedUp && slotStart < windowEnd;
}

function pickZoomForSlot(day, time, instructor=null){
  // מקסימום 3 באותה משבצת זמן זהה
  const usedNowExact = getEventsInCell(day, time).map(e => e.zoom);
  const availableExact = ZOOMS.filter(z => !usedNowExact.includes(z));
  if(availableExact.length === 0) return null;

  // וגם פנוי מבחינת חפיפה
  const available = availableExact.filter(z => isZoomFree(day, time, z));
  if(available.length === 0) return null;

  const idx = TIME_SLOTS.indexOf(time);

  // עדיפות 1: אם אותו מדריך לימד במשבצת הקודמת, תן לו את אותו Zoom (אם פנוי)
  if(instructor && idx > 0){
    const prevTime = TIME_SLOTS[idx - 1];
    const prev = scheduleData.find(e => e.day===day && e.time===prevTime && e.instructor===instructor);
    if(prev && available.includes(prev.zoom)) return prev.zoom;
  }

  // עדיפות 2: Zoom שלא היה במשבצת הזמן הקודמת
  let usedPrev = [];
  if(idx > 0){
    const prevTime = TIME_SLOTS[idx - 1];
    usedPrev = getEventsInCell(day, prevTime).map(e => e.zoom);
  }

  const preferred = available.find(z => !usedPrev.includes(z));
  return preferred || available[0];
}

// שלב 2 – תיקון רצפים אוטומטי
// סורק את כל הימים ומנסה לאחד חשבונות Zoom של אותו מדריך בשעות רצופות
async function repairSequences(){
  for(const day of activeScheduleDates){
    for(let i = 0; i < TIME_SLOTS.length - 1; i++){
      const time1 = TIME_SLOTS[i];
      const time2 = TIME_SLOTS[i + 1];

      // שעה 2 נעולה – דילוג
      if(isSlotLocked(time2)) continue;

      const events2 = getEventsInCell(day, time2);
      for(const ev2 of [...events2]){
        const ev1 = getEventsInCell(day, time1).find(e => e.instructor === ev2.instructor);
        if(!ev1 || ev1.zoom === ev2.zoom) continue;

        // אפשרות א: Zoom של שעה 1 פנוי בשעה 2 – עדכן שעה 2 בלבד
        if(isZoomFree(day, time2, ev1.zoom)){
          await deleteItemByEvent(ev2);
          await addItem(ev2.day, ev2.time, ev2.instructor, ev1.zoom, ev2.school, ev2.course);
          break;
        }

        // אפשרות ב: מצא Zoom פנוי בשתי השעות ועדכן את שתיהן
        if(!isSlotLocked(time1)){
          const freeInBoth = ZOOMS.find(z =>
            !scheduleData.some(e => e.day === day && e.zoom === z && slotsOverlap(e.time, time1) && e.id !== ev1.id) &&
            !scheduleData.some(e => e.day === day && e.zoom === z && slotsOverlap(e.time, time2) && e.id !== ev2.id)
          );
          if(freeInBoth){
            await deleteItemByEvent(ev1);
            await addItem(ev1.day, ev1.time, ev1.instructor, freeInBoth, ev1.school, ev1.course);
            await deleteItemByEvent(ev2);
            await addItem(ev2.day, ev2.time, ev2.instructor, freeInBoth, ev2.school, ev2.course);
            break;
          }
        }
      }
    }
  }
}

${quickLink}`;

async function saveAssignment(){
  const date = modalState.date;
  const time = modalState.time;

  if(!date || !time){
    modalStatusEl.textContent = 'שגיאה: חסר יום/שעה.';
    return;
  }

  // שלב 3 – מניעת שינוי שעות קרובות
  if(isSlotLocked(time)){
    modalStatusEl.textContent = 'לא ניתן לשבץ שיעורים בשעות קרובות.';
    return;
  }

  const instructor = modalInstructorEl.value;
  if(!instructor){
    modalStatusEl.textContent = 'יש לבחור מדריך.';
    return;
  }

  const pendingPotentialId = window.pendingAssignment?.potentialId || modalState.potentialId || '';

  if(pendingPotentialId && schedule.some(e => String(e.potentialId || '') === String(pendingPotentialId))){
    modalStatusEl.textContent = 'פעילות זו כבר שובצה';
    return;
  }

  const [start,end] = time.split('-');
  const check = canAssignSlot(date, start, end, instructor, pendingPotentialId);
  if(!check.ok){
    modalStatusEl.textContent = getReasonLabel(check.reason, check.suggestion || "").text;
    return;
  }

  const zoom = check.zoom;
  const school = modalSchoolEl.value || '';
  const course = modalCourseEl.value || '';
  if(!zoom){
    modalStatusEl.textContent = 'אין חשבון Zoom פנוי בשעה זו.';
    return;
  }

  // לא לשבץ אותו Zoom באותה משבצת (זהה)
  if(getEventsInCell(date, time).some(e => e.zoom === zoom)){
    modalStatusEl.textContent = 'חשבון Zoom זה כבר משובץ במשבצת זו.';
    return;
  }

  setSaveBtnLoading(true);

  try{
    await addItem(date, time, instructor, zoom, school, course, pendingPotentialId);
    await repairSequences();

    if(window.pendingAssignment?.potentialId){
      await markPotentialAsAssigned(window.pendingAssignment.potentialId);
      window.pendingAssignment = null;
    }

    const onAssigned = modalState.onAssigned;
    closeModal();
    render();
    if(onAssigned) await onAssigned();
  }catch(err){
    modalStatusEl.textContent = 'שגיאה בשמירה. בדוק הרשאות/פריסה של הסקריפט.';
    console.error(err);
  }finally{
    setSaveBtnLoading(false);
  }
}

function normalizePotentialDate(dateStr){
  if(dateStr instanceof Date && !isNaN(dateStr)){
    return formatDateKey(dateStr);
  }

  const raw = String(dateStr || '').trim();
  if(!raw) return '';

  const iso = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(iso){
    const dd = iso[3].padStart(2,'0');
    const mm = iso[2].padStart(2,'0');
    return `${dd}/${mm}/${iso[1]}`;
  }

  const dmy = raw.match(/^(\d{1,2})[./-](\d{1,2})[./-](\d{2,4})$/);
  if(dmy){
    const dd = dmy[1].padStart(2,'0');
    const mm = dmy[2].padStart(2,'0');
    const yyyy = dmy[3].length === 2 ? `20${dmy[3]}` : dmy[3];
    return `${dd}/${mm}/${yyyy}`;
  }

  const parsed = new Date(raw);
  if(!isNaN(parsed)) return formatDateKey(parsed);

  return raw;
}

function parseCompleted(value){
  if(value === true || value === 1) return true;
  const v = String(value || '').toLowerCase().trim();
  return ['true','1','yes','כן','בוצע','completed'].includes(v);
}

function normalizePotentialTime(value){
  if(value === null || value === undefined) return '';

  if(typeof value === 'number' && Number.isFinite(value)){
    const totalMinutes = Math.round(value * 24 * 60);
    const hh = Math.floor(totalMinutes / 60) % 24;
    const mm = totalMinutes % 60;
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }

  const raw = String(value).trim();
  if(!raw) return '';

  const hhmmMatch = raw.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if(hhmmMatch){
    return `${hhmmMatch[1].padStart(2,'0')}:${hhmmMatch[2]}`;
  }

  // ISO datetime string (e.g. "1899-12-30T07:00:00.000Z" from Google Apps Script)
  // Parse as Date and read local timezone hours — raw UTC digits would be wrong for IST (UTC+2/+3)
  const isoMatch = raw.match(/T\d{2}:\d{2}/i);
  if(isoMatch){
    const d = new Date(raw);
    if(!isNaN(d)){
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }

  return raw;
}

function mapPotentialRow(raw){
  return {
    id: firstDefined(raw, ['id','ID','Id']),
    date: normalizePotentialDate(firstDefined(raw, ['Date','date','תאריך'])),
    authority: firstDefined(raw, ['Authority','authority','רשות']),
    school: firstDefined(raw, ['School','school','בית ספר']),
    program: firstDefined(raw, ['Program','program','תוכנית']),
    employee: firstDefined(raw, ['Employee','employee','מדריך']),
    startTime: normalizePotentialTime(raw?.StartTime ?? raw?.startTime ?? raw?.start ?? raw?.['שעת התחלה']),
    endTime: normalizePotentialTime(raw?.EndTime ?? raw?.endTime ?? raw?.end ?? raw?.['שעת סיום']),
    notes: firstDefined(raw, ['Notes','notes','הערות']),
    status: firstDefined(raw, ['Status','status']),
    completed: parseCompleted(raw?.Completed ?? raw?.completed)
  };
}

function getMonthKey(dateStr){
  const normalized = normalizePotentialDate(dateStr);
  const m = normalized.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m) return selectedPotentialMonth;
  return `${m[2]}/${m[3]}`;
}

function getWeekOfMonth(dateStr){
  const normalized = normalizePotentialDate(dateStr);
  const m = normalized.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m) return 1;
  const day = Number(m[1]);
  return Math.min(4, Math.max(1, Math.ceil(day / 7)));
}

function getPotentialDayLetter(dateStr){
  const normalized = normalizePotentialDate(dateStr);
  const m = normalized.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m) return null;
  const d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
  const jsDay = d.getDay();
  if(jsDay < 1 || jsDay > 5) return null;
  return POTENTIAL_DAYS[jsDay - 1];
}

function normalizeTimes(startTime,endTime){
  const start = roundStartTime(startTime);
  const end = roundEndTime(endTime);
  if(!start || !end) return null;

  const startMinutes = toMinutes(start);
  const endMinutes = toMinutes(end);
  if(endMinutes <= startMinutes) return null;

  return { startTime: start, endTime: end, time: `${start}-${end}` };
}

function convertDateToScheduleDate(dateStr){
  const normalized = normalizePotentialDate(dateStr);
  if(activeScheduleDates.includes(normalized)) return normalized;
  return null;
}

function canAssignSlot(date,start,end,instructor,potentialId=''){
  const time = `${start}-${end}`;

  if(!activeScheduleDates.includes(date)){
    return { ok:false, reason:'outside_schedule' };
  }

  if(!isTimeInSchedule(time)){
    return { ok:false, reason:'outside_schedule' };
  }

  if(potentialId && scheduleData.some(e => e.potentialId && String(e.potentialId) === String(potentialId))){
    return { ok:false, reason:'assigned' };
  }

  if(!isInstructorFree(date, time, instructor)){
    return { ok:false, reason:'instructor' };
  }

  const zoom = pickZoomForSlot(date, time, instructor);
  if(!zoom) return { ok:false, reason:'zoom' };

  if(!isZoomFree(date, time, zoom)){
    return { ok:false, reason:'zoom' };
  }

  return { ok:true, zoom, time };
}

function hasAssignmentContinuity(date, time, instructor){
  if(!instructor) return false;
  const idx = TIME_SLOTS.indexOf(time);
  if(idx < 0) return false;
  const prev = idx > 0 ? TIME_SLOTS[idx - 1] : null;
  const next = idx < TIME_SLOTS.length - 1 ? TIME_SLOTS[idx + 1] : null;
  return Boolean(
    (prev && scheduleData.some(e => e.day === date && e.time === prev && e.instructor === instructor)) ||
    (next && scheduleData.some(e => e.day === date && e.time === next && e.instructor === instructor))
  );
}

function checkPotentialAssignment(row){
  if(row.status === 'assigned' || row.completed){
    row.status = 'assigned';
    return { ok:false, status:'assigned', reason:'assigned' };
  }

  const date = normalizePotentialDate(row.date);
  const normalized = normalizeTimes(row.startTime, row.endTime);
  if(!date || !normalized){
    row.status = 'no_available_slot';
    return { ok:false, status:'no_available_slot', reason:'invalid' };
  }

  const time = normalized.time;
  if(!activeScheduleDates.includes(date) || !isTimeInSchedule(time)){
    row.status = 'no_available_slot';
    return { ok:false, status:'no_available_slot', reason:'outside_schedule' };
  }

  if(!isInstructorFree(date, time, row.employee)){
    row.status = 'instructor_conflict';
    return { ok:false, status:'instructor_conflict', reason:'instructor' };
  }

  const zoom = pickZoomForSlot(date, time, row.employee);
  if(!zoom || !isZoomFree(date, time, zoom)){
    row.status = 'zoom_conflict';
    return { ok:false, status:'zoom_conflict', reason:'zoom' };
  }

  const continuity = hasAssignmentContinuity(date, time, row.employee);
  row.status = continuity ? 'ok' : 'no_available_slot';
  return { ok: continuity, status: row.status, reason: continuity ? '' : 'no_available_slot', zoom, normalized, date, time };
}

function prepareAssignment(row){
  const normalized = normalizeTimes(row.startTime, row.endTime);
  if(!normalized) return null;

  return {
    potentialId: row.id,
    date: normalizePotentialDate(row.date),
    start: normalized.startTime,
    end: normalized.endTime,
    teacher: row.employee,
    program: row.program,
    school: row.school
  };
}

function prefillAssignment(data){
  if(!data) return;

  const date = convertDateToScheduleDate(data.date);
  const time = `${data.start}-${data.end}`;
  if(!date) return;

  openModal(date, time, { potentialId: data.potentialId || null });

  const instructorSelect = document.querySelector('#modalInstructor') || document.querySelector('#instructorSelect');
  const schoolSelect = document.querySelector('#modalSchool') || document.querySelector('#schoolSelect');
  const courseSelect = document.querySelector('#modalCourse') || document.querySelector('#courseSelect');

  if(instructorSelect){
    instructorSelect.value = data.teacher || '';
    populateInstructorDetails();
  }

  if(schoolSelect){
    const schoolExists = Array.from(schoolSelect.options || []).some(opt => opt.value === data.school);
    if(schoolExists) schoolSelect.value = data.school || '';
    schoolSelect.dispatchEvent(new Event('change'));
  }

  if(courseSelect){
    const courseExists = Array.from(courseSelect.options || []).some(opt => opt.value === data.program);
    if(courseExists) courseSelect.value = data.program || '';
  }

  updateZoomSuggestion();
}

function consumePendingAssignment(){
  if(window.pendingAssignment){
    prefillAssignment(window.pendingAssignment);
  }
}

function getReasonLabel(reason, suggestion=''){
  if(reason === 'assigned') return { text:'שובץ', css:'assigned' };
  if(reason === 'zoom') return { text:'🔴 אין זום פנוי' + suggestion, css:'bad' };
  if(reason === 'overlap') return { text:'🟠 חפיפה', css:'warn' };
  if(reason === 'instructor') return { text:'🔴 מדריך תפוס', css:'bad' };
  if(reason === 'invalid') return { text:'שעות לא תקינות', css:'bad' };
  if(reason === 'no_available_slot') return { text:'🟡 דורש בדיקה', css:'warn' };
  if(reason === 'outside_schedule') return { text:'מחוץ ללוח החודשי', css:'bad' };
  return { text:'✔ ניתן לשבץ', css:'ok' };
}

function suggestAlternative(day, baseTime, instructor){
  const slot = parseSlot(baseTime);
  for(const plus of [1,2]){
    const startMin = slot.start + plus * 60;
    const endMin = slot.end + plus * 60;
    const suggested = `${String(Math.floor(startMin / 60)).padStart(2,'0')}:00-${String(Math.floor(endMin / 60)).padStart(2,'0')}:00`;
    if(pickZoomForSlot(day, suggested, instructor)){
      return `, זמין ב ${suggested.split('-')[0]}`;
    }
  }
  return '';
}

function canSchedulePotential(row){
  const check = checkPotentialAssignment(row);
  if(!check.ok){
    if(check.reason === 'zoom'){
      return { ok:false, reason:'zoom', zoom:'', suggestion:suggestAlternative(normalizePotentialDate(row.date), normalizeTimes(row.startTime,row.endTime)?.time || '', row.employee) };
    }
    return { ok:false, reason:check.reason, zoom:'' };
  }

  return { ok:true, reason:'', zoom:check.zoom, normalized:check.normalized, date:check.date, time:check.time };
}

function buildPotentialCalendarModel(data){
  const filtered = data.filter(row => getMonthKey(row.date) === selectedPotentialMonth);
  const datesByWeek = new Map();

  activeScheduleDates.forEach(date => {
    if(getMonthKey(date) !== selectedPotentialMonth) return;
    const week = getWeekOfMonth(date);
    if(!datesByWeek.has(week)) datesByWeek.set(week, []);
    datesByWeek.get(week).push(date);
  });

  filtered.forEach(row => {
    const date = normalizePotentialDate(row.date);
    if(!activeScheduleDates.includes(date)) return;
    const week = getWeekOfMonth(date);
    if(!datesByWeek.has(week)) datesByWeek.set(week, []);
    if(!datesByWeek.get(week).includes(date)) datesByWeek.get(week).push(date);
  });

  const weeks = [...datesByWeek.entries()]
    .sort((a,b)=>a[0]-b[0])
    .map(([week, dates])=>({ week, dates: dates.sort((a,b)=>parseDateKey(a)-parseDateKey(b)) }));

  return { weeks, count: filtered.length, filtered };
}

function renderPotential(data){
  const model = buildPotentialCalendarModel(data);
  potentialEmptyEl.style.display = model.count ? 'none' : 'block';

  potentialCalendarEl.innerHTML = model.weeks.map(week => `
    <section class="potential-week">
      <div class="potential-week-title">שבוע ${week.week}</div>
      <div class="potential-week-grid" style="grid-template-columns:repeat(${week.dates.length || 1},1fr)">
        ${week.dates.map(date => {
          const items = model.filtered.filter(row => normalizePotentialDate(row.date) === date);
          return `<div class="potential-day-col"><div class="potential-day-head">${escHtml(getWeekdayHebName(date))}</div><div class="potential-day-body">${items.map(row => {
            const check = canSchedulePotential(row);
            const label = check.ok
              ? getReasonLabel(check.reason, check.suggestion || '')
              : getReasonLabel(check.reason, check.suggestion || '');
            return `<article class="potential-item" data-id="${escHtml(row.id)}">
              <div class="potential-item-row"><b>תאריך:</b> ${escHtml(date)}</div>
              <div class="potential-item-row"><b>רשות:</b> ${escHtml(row.authority)}</div>
              <div class="potential-item-row"><b>בית ספר:</b> ${escHtml(row.school)}</div>
              <div class="potential-item-row"><b>תוכנית:</b> ${escHtml(row.program)}</div>
              <div class="potential-item-row"><b>מדריך:</b> ${escHtml(row.employee)}</div>
              <div class="potential-item-row"><input type="time" class="startTime-field" value="${escHtml(row.startTime)}"> - <input type="time" class="endTime-field" value="${escHtml(row.endTime)}"></div>
              <div class="potential-item-row"><input class="notes-field" type="text" value="${escHtml(row.notes)}" /></div>
              <div class="potential-item-actions">
                <span class="potential-status ${label.css}">${label.text}</span>
                ${check.ok ? `<button type="button" class="assign-btn">שבץ</button>` : ''}
              </div>
            </article>`;
          }).join('') || '<div class="potential-muted">—</div>'}</div></div>`;
        }).join('')}
      </div>
    </section>
  `).join('');

  potentialCalendarEl.querySelectorAll('.potential-item').forEach(card => {
    const id = card.dataset.id;
    const startInput = card.querySelector('.startTime-field');
    const endInput = card.querySelector('.endTime-field');
    const notesInput = card.querySelector('.notes-field');
    const assignBtn = card.querySelector('.assign-btn');

    if(startInput) startInput.addEventListener('change', (e)=>{ updatePotentialTime(id, 'startTime', e.target.value); renderPotential(potentialData); });
    if(endInput) endInput.addEventListener('change', (e)=>{ updatePotentialTime(id, 'endTime', e.target.value); renderPotential(potentialData); });
    if(notesInput) notesInput.addEventListener('change', (e)=> updateNotes(id, e.target.value));
    if(assignBtn) assignBtn.addEventListener('click', ()=> assignFromPotentialById(id));
  });
}


async function consumePotential(rowId){
  const row = potentialData.find(item => String(item.id) === String(rowId));
  if(!row) return { success:false, reason:'potential_not_found' };

  const normalized = normalizeTimes(row.startTime, row.endTime);
  if(!normalized) return { success:false, reason:'invalid' };

  row.startTime = normalized.startTime;
  row.endTime = normalized.endTime;

  const check = canAssignSlot(normalizePotentialDate(row.date), normalized.startTime, normalized.endTime, row.employee, row.id);
  if(!check.ok) return { success:false, reason:check.reason };

  const res = await fetch(API_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain' },
    body: JSON.stringify({ action:'assign', id: row.id })
  });
  const data = await res.json();
  if(!data.success) return { success:false, reason:data.reason || 'assign_failed' };

  row.completed = true;
  row.status = 'assigned';
  return { success:true };
}

async function assignFromPotential(row){
  const result = await consumePotential(row.id);
  if(!result.success){
    const label = getReasonLabel(result.reason || 'no_available_slot');
    alert(label.text);
    return;
  }

  await loadSchedule();
  renderSchedule();
  renderPotential(potentialData);
}

async function markPotentialAsAssigned(potentialId){
  if(!potentialId) return;

  const row = potentialData.find(item => String(item.id) === String(potentialId));
  if(row){
    row.status = 'assigned';
    row.completed = true;
  }

  await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body: JSON.stringify({
      action:"updatepotential",
      id: potentialId,
      startTime: row?.startTime || '',
      endTime: row?.endTime || '',
      notes: row?.notes || '',
      status: 'assigned',
      completed: true
    })
  });
}

function assignFromPotentialById(id){
  const row = potentialData.find(item => String(item.id) === String(id));
  if(!row) return;
  assignFromPotential(row).catch(err => {
    console.error(err);
    alert('שגיאה בתהליך השיבוץ מהפוטנציאל.');
  });
}

async function loadPotentialData(){
  const res = await fetch(API_URL + '?action=potential');
  const data = await res.json();
  const rows = Array.isArray(data) ? data : (data.data || []);
  potentialData = rows.map(mapPotentialRow);
  potentialData.forEach(checkPotentialAssignment);
  pendingPotentialUpdates.clear();
  renderPotential(potentialData);
}

async function updateRow(id, notes, completed){
  const row = potentialData.find(item => item.id === id);
  if(!row) return;

  row.notes = notes;
  row.completed = completed;

  await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"text/plain"
    },
    body:JSON.stringify({
      action:"updatepotential",
      id:row.id,
      startTime:row.startTime,
      endTime:row.endTime,
      notes:row.notes,
      status:row.status || '',
      completed:row.completed
    })
  });
}

async function updateNotes(id, notes){
  const row = potentialData.find(item => item.id === id);
  if(!row) return;
  row.notes = notes;
  pendingPotentialUpdates.add(id);
}

async function updatePotentialTime(id, field, value){
  const row = potentialData.find(item => item.id === id);
  if(!row || !['startTime','endTime'].includes(field)) return;
  row[field] = value;
  checkPotentialAssignment(row);
  pendingPotentialUpdates.add(id);
}

async function toggleCompleted(id, completed){
  const row = potentialData.find(item => item.id === id);
  if(!row) return;
  row.completed = completed;
  pendingPotentialUpdates.add(id);
}

function openPotentialView(){
  scheduleViewEl.classList.remove('active');
  potentialViewEl.classList.add('active');
  potentialNavBtn.textContent = 'לו"ז';
}

function openScheduleView(){
  potentialViewEl.classList.remove('active');
  scheduleViewEl.classList.add('active');
  potentialNavBtn.textContent = 'פוטנציאל';
}

async function loadPage(view){
  if(view === 'potential'){
    await loadPotentialData();
    openPotentialView();
    return;
  }

  await loadSchedule();
  renderSchedule();
  openScheduleView();
  consumePendingAssignment();
}

potentialNavBtn.addEventListener('click', async ()=>{
  const isPotentialOpen = potentialViewEl.classList.contains('active');

  try{
    await saveData();
    if(isPotentialOpen){
      await loadPage('schedule');
    }else{
      await loadPage('potential');
    }
  }catch(err){
    if(!isPotentialOpen){
      potentialCalendarEl.innerHTML = '';
      potentialEmptyEl.style.display = 'block';
      potentialEmptyEl.textContent = 'שגיאה בטעינת נתוני פוטנציאל.';
    }
    console.error(err);
  }
});

// --- Init ---
async function initApp(){
  initScheduleControls();
  await loadSchedule();
  renderSchedule();
  consumePendingAssignment();
}

window.onload = initApp;
</script>
