<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>מערכת ניהול Zoom - תעשיידע</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div>
      <div style="font-weight:800;font-size:16px">מערכת ניהול Zoom</div>
      <div id="weekLabel" style="color:#6b7280;font-size:13px"></div>
    </div>

    <div class="toolbar">
      <input id="searchInstructor" placeholder="חיפוש מדריך..." />
      <select id="filterZoom">
        <option value="">כל ה-Zoom</option>
        <option value="Zoom1">Zoom1</option>
        <option value="Zoom2">Zoom2</option>
        <option value="Zoom3">Zoom3</option>
      </select>
      <button id="reloadData">רענן</button>
      <button id="resetSchedule" class="danger">נקה לו״ז</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>לו״ז שבועי</h2>
      <div id="board"></div>
    </section>

    <aside class="panel">
      <h2>פוטנציאל</h2>
      <div style="padding:10px;display:flex;gap:8px">
        <button id="potentialSave" class="primary" style="flex:1">שמור פוטנציאל</button>
      </div>
      <div id="potentialList"></div>
    </aside>
  </main>

  <dialog id="assignModal">
    <form id="assignForm" class="modal">
      <h3>שיבוץ</h3>

      <div class="grid">
        <div class="full hint" id="roundingHint" style="display:none"></div>

        <label class="full">
          תאריך
          <input name="date" id="assignDate" readonly />
        </label>

        <label>
          שעה (Slot)
          <select name="slot" id="assignSlot"></select>
        </label>

        <label>
          Zoom (אופציונלי)
          <select name="zoom" id="assignZoom">
            <option value="">אוטומטי</option>
            <option value="Zoom1">Zoom1</option>
            <option value="Zoom2">Zoom2</option>
            <option value="Zoom3">Zoom3</option>
          </select>
        </label>

        <label class="full">
          מדריך
          <select name="instructor" id="assignInstructor"></select>
        </label>

        <label class="full">
          בית ספר
          <input name="school" id="assignSchool" />
        </label>

        <label class="full">
          תוכנית
          <input name="course" id="assignCourse" />
        </label>
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-start;margin-top:12px">
        <button type="submit" class="primary">שבץ</button>
        <button type="button" id="closeModal">ביטול</button>
      </div>
    </form>
  </dialog>

  <script type="module">
    import { init } from "./ui.js";
    init();
  </script>
</body>
</html>
