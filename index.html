<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zoom Scheduler</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <div class="toolbar">

      <select id="viewMode">
        <option value="schedule">שיבוץ</option>
        <option value="potential">פוטנציאל</option>
      </select>

      <input id="searchInput" placeholder="חיפוש (רשות / בית ספר / מדריך / תוכנית)" />

      <button id="reloadBtn">רענון</button>

      <!-- חדש: ניווט שבוע -->
      <div class="week-nav">
        <button id="prevWeek" type="button" class="week-btn">‹ שבוע</button>
        <button id="todayWeek" type="button" class="week-btn">היום</button>
        <button id="nextWeek" type="button" class="week-btn">שבוע ›</button>
        <input id="weekPicker" type="date" class="week-date" />
        <div id="weekLabel" class="week-label"></div>
      </div>

    </div>

    <div id="board" class="board"></div>

    <div id="potentialPanel" class="panel" style="display:none;">
      <h3>רשומות פוטנציאל</h3>
      <div id="potentialList" class="potential-list"></div>
    </div>

    <!-- modal -->
    <div id="modalOverlay" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-head">
          <div id="modalTitle" class="modal-title"></div>
          <button id="modalCloseBtn" class="modal-close">✕</button>
        </div>

        <div class="modal-body">
          <div class="grid">
            <label>תאריך</label>
            <input id="mDate" type="date" />

            <label>שעה התחלה</label>
            <select id="mStart"></select>

            <label>שעה סיום</label>
            <select id="mEnd"></select>

            <label>רשות</label>
            <input id="mAuthority" />

            <label>בית ספר</label>
            <input id="mSchool" />

            <label>תוכנית</label>
            <input id="mProgram" />

            <label>מדריך</label>
            <input id="mEmployee" />

            <label>Zoom</label>
            <select id="mZoom"></select>

            <label>הערות</label>
            <input id="mNotes" />
          </div>
        </div>

        <div class="modal-actions">
          <button id="saveBtn">שמירה</button>
          <button id="deleteBtn" class="danger">מחיקה</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="./ui.js"></script>
</body>
</html>
